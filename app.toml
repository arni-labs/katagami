name = "katagami-curation"
description = "Agent work layer for katagami — CurationJob queue, curator sessions, CurationDirection fan-out, and template-owned curation pipeline."
version = "0.1.0"
startup_install = "core"
dependencies = [
  "temperpaw/paw-fs@8cc9c1a0c3959ba0555a6eac5446db76de747817",
  "temperpaw/paw-agent@c2e99e5e5bae0dbfc667fee929100cef32ecebc6",
  "temperpaw/paw-research@910d01612b2632362fb5f537c4357a5fb6c7bcdd",
  "katagami/katagami-commons@1cc425ef14205e9d63bdec5f8289bb110e4d4b3f",
]

# These declarations are REQUIRED — the installer only uploads WASM
# artifacts listed here. Without them, even if the compiled `.wasm`
# files are shipped in the image, `wasm_modules: []` comes back empty
# at tenant install and every WASM trigger (build_session_message,
# finalize_spawned_session, launch_research) fails with
# "WASM module not found". Same trap that hit paw-research on
# 2026-04-18.

[[wasm_modules]]
name = "build_session_message"
criticality = "app-required"
startup_loading = "lazy"

[[wasm_modules]]
name = "finalize_spawned_session"
criticality = "app-required"
startup_loading = "lazy"

[[wasm_modules]]
name = "launch_research"
criticality = "app-required"
startup_loading = "lazy"
