# ArtStyle — I/O Automaton Specification
#
# An engine-agnostic art-style RECIPE (not a folder of images): a Medium
# (illustration / photography / painting / print / 3d / collage), a portable
# PromptTemplate carrying `{subject}` and `{palette}` holes, a NegativePrompt,
# per-slot SubjectRecipes (hero -> wide scene, empty-state -> single object,
# avatar -> portrait), ReferenceImages (the look + the mixer's zero-generation
# preview material), and ProofShots (canonical subjects rendered in-style).
#
# Generation is delegated downstream: Katagami stores the recipe + references;
# the consumer's agent fills {subject}/{palette} and generates the real art.
#
# Lifecycle: Draft -> UnderReview -> Published -> Archived
#                         ^              |             |
#                         └──────────────┴─────────────┘ (Revise/Restore)
#
# Key invariants: can't Publish without medium + prompt template + verified
# reference images + slot recipes + verified proof shots + verified thumbnail
# + credits + model provenance + quality review + public assets.

[automaton]
name = "ArtStyle"
states = ["Draft", "UnderReview", "Published", "Archived"]
initial = "Draft"

allow_indefinite_states = ["Draft", "UnderReview", "Published", "Archived"]

# --- State Variables ---

[[state]]
name = "has_medium"
type = "bool"
initial = "false"

[[state]]
name = "has_prompt_template"
type = "bool"
initial = "false"

[[state]]
name = "has_slot_recipes"
type = "bool"
initial = "false"

[[state]]
name = "has_reference_images"
type = "bool"
initial = "false"

[[state]]
name = "has_proof_shots"
type = "bool"
initial = "false"

[[state]]
name = "has_thumbnail"
type = "bool"
initial = "false"

[[state]]
name = "has_published_assets"
type = "bool"
initial = "false"

[[state]]
name = "review_status"
type = "string"
initial = "unreviewed"

[[state]]
name = "quality_review_passed"
type = "bool"
initial = "false"

[[state]]
name = "featured"
type = "bool"
initial = "false"

[[state]]
name = "display_order"
type = "counter"
initial = 0

[[state]]
name = "version"
type = "counter"
initial = 0

[[state]]
name = "fork_count"
type = "counter"
initial = 0

[[state]]
name = "usage_count"
type = "counter"
initial = 0

[[state]]
name = "has_credits"
type = "bool"
initial = "false"

[[state]]
name = "has_model_provenance"
type = "bool"
initial = "false"

# --- Actions: Recipe Authoring (Draft & UnderReview) ---

[[action]]
name = "SetName"
kind = "input"
from = ["Draft", "UnderReview"]
effect = [{ type = "set_bool", var = "has_published_assets", value = "false" }, { type = "set_bool", var = "quality_review_passed", value = "false" }]
params = ["name", "slug"]
hint = "Set the art style name and URL-safe slug."

[[action]]
name = "SubmitArtStyle"
kind = "input"
from = ["Draft"]
effect = [
  { type = "set_bool", var = "has_medium", value = "true" },
  { type = "set_bool", var = "has_prompt_template", value = "true" },
  { type = "set_bool", var = "has_slot_recipes", value = "true" },
  { type = "set_bool", var = "has_reference_images", value = "true" },
  { type = "set_bool", var = "has_proof_shots", value = "true" },
  { type = "set_bool", var = "has_thumbnail", value = "true" },
  { type = "set_bool", var = "has_credits", value = "true" },
  { type = "set_bool", var = "has_model_provenance", value = "true" }
]
params = ["name", "slug", "medium", "prompt_template", "negative_prompt", "engine_hints", "slot_recipes", "guidance", "reference_image_file_ids", "reference_manifest", "proof_shots_file_ids", "proof_shots_manifest", "thumbnail_file_id", "parent_ids", "lineage_type", "generation_number", "model_provenance", "credits", "tags", "direction_id", "curator_notes"]
hint = "Contributor hot-path: author a COMPLETE art style in ONE call — name/medium/prompt_template (with {subject}+{palette})/slot_recipes/guidance + all image file ids (reference images + manifest, proof shots + manifest, thumbnail) + lineage + model_provenance + credits + direction_id (the bake-off round this belongs to). Sets every SubmitForReview guard var so the next call is SubmitForReview. Leaves the entity in Draft — contributors never self-publish; a curator reviews then Publishes. Files must already be uploaded and Ready (the SubmitForReview cross-entity guards still verify them). Mirrors SetSpec/SubmitDesignLanguage; collapses the author ladder into one."


[[action]]
name = "SetMedium"
kind = "input"
from = ["Draft", "UnderReview"]
effect = [{ type = "set_bool", var = "has_medium", value = "true" }, { type = "set_bool", var = "quality_review_passed", value = "false" }]
params = ["medium"]
hint = "Set the medium: illustration | photography | painting | print | 3d | collage | mixed."

[[action]]
name = "SetPromptTemplate"
kind = "input"
from = ["Draft", "UnderReview"]
effect = [{ type = "set_bool", var = "has_prompt_template", value = "true" }, { type = "set_bool", var = "has_published_assets", value = "false" }, { type = "set_bool", var = "quality_review_passed", value = "false" }]
params = ["prompt_template", "negative_prompt", "engine_hints"]
hint = "Set the portable prompt template (must contain {subject} and {palette} holes), an optional negative prompt, and per-engine hints (JSON: mj/recraft/nano-banana/replicate notes)."

[[action]]
name = "SetSlotRecipes"
kind = "input"
from = ["Draft", "UnderReview"]
effect = [{ type = "set_bool", var = "has_slot_recipes", value = "true" }, { type = "set_bool", var = "quality_review_passed", value = "false" }]
params = ["slot_recipes"]
hint = "Set per-slot subject recipes as JSON (e.g. hero -> 'wide establishing scene', empty-state -> 'single friendly object', avatar -> 'portrait bust')."

[[action]]
name = "SetGuidance"
kind = "input"
from = ["Draft", "UnderReview"]
effect = [{ type = "set_bool", var = "quality_review_passed", value = "false" }]
params = ["guidance"]
hint = "Set usage guidance (do's, don'ts, what subjects suit this style, when to avoid it)."

# --- Actions: Reference Images (the look + preview material) ---

[[action]]
name = "AttachReferenceImages"
kind = "input"
from = ["Draft", "UnderReview"]
effect = [{ type = "set_bool", var = "has_reference_images", value = "true" }, { type = "set_bool", var = "has_published_assets", value = "false" }, { type = "set_bool", var = "quality_review_passed", value = "false" }]
params = ["reference_image_file_ids", "reference_manifest"]
hint = "Attach reference image file ids (the style's look; also the mixer's zero-generation preview material) plus a manifest describing each (subject, aspect, role, and optionally the image model that produced it as {model, provider}). One style may carry samples from DIFFERENT image engines — that is ideal, not an error; record the engine per item so it can be displayed. The Publish/SubmitForReview cross_entity_state guards require every referenced image File to be Ready/Locked. Published styles must Revise first."

# --- Actions: Proof Shots (canonical subjects rendered in-style) ---

[[action]]
name = "AttachProofShots"
kind = "input"
from = ["Draft", "UnderReview"]
effect = [{ type = "set_bool", var = "has_proof_shots", value = "true" }, { type = "set_bool", var = "has_published_assets", value = "false" }, { type = "set_bool", var = "quality_review_passed", value = "false" }]
params = ["proof_shots_file_ids", "proof_shots_manifest"]
hint = "Attach the proof-shot set (portrait / landscape / object / pattern rendered in this style) demonstrating the recipe transfers across subjects. Manifest items may carry the producing image model as {model, provider}; mixed engines across shots are welcome and should be recorded per item. The Publish cross_entity_state guard requires every referenced proof-shot File to be Ready/Locked."

# --- Actions: Thumbnail / Public Assets ---

[[action]]
name = "AttachThumbnail"
kind = "input"
from = ["Draft", "UnderReview"]
effect = [{ type = "set_bool", var = "has_thumbnail", value = "true" }, { type = "set_bool", var = "has_published_assets", value = "false" }]
params = ["thumbnail_file_id"]
hint = "Attach or update the static gallery thumbnail (representative reference shot). The Publish/SubmitForReview cross_entity_state guards require the referenced thumbnail File to be Ready/Locked."

[[action]]
name = "AttachVerifiedThumbnail"
kind = "internal"
from = ["Draft", "UnderReview"]
effect = [{ type = "set_bool", var = "has_thumbnail", value = "true" }, { type = "set_bool", var = "has_published_assets", value = "false" }]
params = ["thumbnail_file_id"]
hint = "Attach a thumbnail already validated by a backfill job. Published styles must Revise first."

[[action]]
name = "AttachPublishedAssets"
kind = "internal"
from = ["Draft", "UnderReview", "Published"]
effect = [{ type = "set_bool", var = "has_published_assets", value = "true" }]
params = ["thumbnail_asset_id", "thumbnail_asset_url", "reference_assets"]
hint = "Attach immutable public artifact URLs from the generic Temper publish-artifact flow. `reference_assets` is a JSON map of reference file id -> public url for the mixer to composite without auth. PawFS file ids remain the governed source."

[[action]]
name = "AttachTasteVector"
kind = "internal"
from = ["Draft", "UnderReview", "Published"]
params = ["taste_vector", "taste_vector_model"]
hint = "Attach the semantic taste embedding computed from this entity's canonical taste document. taste_vector is a JSON float array; taste_vector_model identifies the embedding model so mixed-model vectors are never compared. Written by the curation finalizer or the backfill job."

[[action]]
name = "AttachComputedFacets"
kind = "internal"
from = ["Draft", "UnderReview", "Published"]
params = ["search_blob"]
hint = "Attach the precomputed lowercase search blob (name + tags + descriptive fields) so the catalog can be searched case-insensitively server-side under keyset pagination — the kernel only $filters flat stored scalars, and only case-sensitively. Written by the curation finalizer or the backfill job."

# --- Actions: Classification ---

[[action]]
name = "SetTaxonomy"
kind = "input"
from = ["Draft", "UnderReview", "Published"]
params = ["taxonomy_ids"]
hint = "Assign taxonomy categories to this art style."

[[action]]
name = "SetTags"
kind = "input"
from = ["Draft", "UnderReview", "Published"]
params = ["tags"]
hint = "Set freeform tags for discovery and search."

[[action]]
name = "SetCredits"
kind = "input"
from = ["Draft", "UnderReview", "Published"]
effect = [{ type = "set_bool", var = "has_credits", value = "true" }]
params = ["credits"]
hint = "Credit the artists, movements, studios, or traditions this style is attributable to. JSON list of {name, kind (artist|movement|studio|tradition), note}. Credit ALL influences — an LLM-produced style is an aggregate of many hands; never pass a recognizable style off as original. Editable on Published without re-publishing."

[[action]]
name = "SetModelProvenance"
kind = "input"
from = ["Draft", "UnderReview", "Published"]
effect = [{ type = "set_bool", var = "has_model_provenance", value = "true" }]
params = ["model_provenance"]
hint = "Record which AI models produced this art style. JSON {style:{model}, source:{model}, images:{model, provider, tool}}: the model that authored the recipe, the LLM that sourced/identified the tradition, and the default engine for sample images. When samples come from multiple engines (ideal, not an error), the per-image truth lives in the reference/proof manifest items ({model, provider} per item); images here is the default/fallback engine. Editable on Published without re-publishing."

[[action]]
name = "SetFeatured"
kind = "input"
from = ["Draft", "UnderReview", "Published"]
params = ["featured", "display_order"]
hint = "Set featured status and display order for gallery sorting."

[[action]]
name = "AddCuratorNotes"
kind = "input"
from = ["Draft", "UnderReview"]
params = ["curator_notes"]
hint = "Add curator feedback notes to a draft or under-review art style."

[[action]]
name = "SetSources"
kind = "input"
from = ["Draft", "UnderReview"]
params = ["source_ids"]
hint = "Link DesignSource entities that informed this art style."

# --- Actions: Lineage ---

[[action]]
name = "SetLineage"
kind = "input"
from = ["Draft"]
params = ["parent_ids", "lineage_type", "generation_number"]
hint = "Set lineage: parent_ids=[] for originals, single parent for evolution, multiple for remix."

# --- Actions: Review Lifecycle ---

[[action]]
name = "SubmitForReview"
kind = "internal"
from = ["Draft"]
to = "UnderReview"
guard = [{ type = "is_true", var = "has_medium" }, { type = "is_true", var = "has_prompt_template" }, { type = "is_true", var = "has_reference_images" }, { type = "is_true", var = "has_thumbnail" }, { type = "cross_entity_state", entity_type = "File", entity_id_source = "reference_image_file_ids", required_status = ["Ready", "Locked"] }, { type = "cross_entity_state", entity_type = "File", entity_id_source = "thumbnail_file_id", required_status = ["Ready", "Locked"] }]
hint = "Submit for curator review. Requires medium, prompt template, reference images, and a thumbnail. Cross-entity guards require every referenced reference-image File and the thumbnail File to be Ready/Locked (bytes durably stored) so an unready/404 file cannot leave Draft."

[[action]]
name = "Publish"
kind = "internal"
from = ["UnderReview"]
to = "Published"
guard = [{ type = "is_true", var = "has_medium" }, { type = "is_true", var = "has_prompt_template" }, { type = "is_true", var = "has_slot_recipes" }, { type = "is_true", var = "has_reference_images" }, { type = "is_true", var = "has_proof_shots" }, { type = "is_true", var = "has_thumbnail" }, { type = "is_true", var = "has_credits" }, { type = "is_true", var = "has_model_provenance" }, { type = "is_true", var = "quality_review_passed" }, { type = "is_true", var = "has_published_assets" }, { type = "cross_entity_state", entity_type = "File", entity_id_source = "reference_image_file_ids", required_status = ["Ready", "Locked"] }, { type = "cross_entity_state", entity_type = "File", entity_id_source = "proof_shots_file_ids", required_status = ["Ready", "Locked"] }, { type = "cross_entity_state", entity_type = "File", entity_id_source = "thumbnail_file_id", required_status = ["Ready", "Locked"] }]
effect = [{ type = "increment", field = "version" }]
hint = "Curator approves and publishes. Requires medium, prompt template, slot recipes, reference images, proof shots, thumbnail, credits, model provenance, quality review, and public assets. Credits and model provenance are publish requirements (ARN-148): a style must credit the tradition it descends from and record which models produced it. Cross-entity guards require every referenced reference-image and proof-shot File and the thumbnail File to be Ready/Locked so an unready/404 artifact cannot publish."

[[action]]
name = "Revise"
kind = "input"
from = ["Published"]
to = "UnderReview"
params = ["curator_notes"]
hint = "Pull a published art style back for revision with stated rationale."

[[action]]
name = "Archive"
kind = "internal"
from = ["Draft", "UnderReview", "Published"]
to = "Archived"
params = ["curator_notes"]
hint = "Archive a malformed, test, superseded, or published art style while preserving a governed restore path."

[[action]]
name = "Restore"
kind = "input"
from = ["Archived"]
to = "UnderReview"
params = ["curator_notes"]
hint = "Restore an archived art style into review so the finalizer can re-verify artifacts and publish through normal guards."

# --- Actions: Quality & Usage Signals ---

[[action]]
name = "UpdateQuality"
kind = "input"
from = ["UnderReview", "Published"]
params = ["quality_score", "review_status"]
hint = "Update quality score and/or review status (unreviewed, reviewed, needs_revision)."

[[action]]
name = "MarkQualityPassed"
kind = "internal"
from = ["UnderReview", "Published"]
effect = [{ type = "set_bool", var = "quality_review_passed", value = "true" }]
params = []
hint = "Mark quality review as passed after finalizer-side artifact and state validation."

[[action]]
name = "IncrementUsage"
kind = "input"
from = ["Published"]
effect = "increment usage_count"
hint = "Record that a remix or agent used this art style."

[[action]]
name = "IncrementFork"
kind = "input"
from = ["Published"]
effect = "increment fork_count"
hint = "Record that a child art style was forked from this one."

# --- Output Actions ---

[[action]]
name = "ArtStylePublishedEvent"
kind = "output"
hint = "Emitted when an art style is published."

[[action]]
name = "ArtStyleArchivedEvent"
kind = "output"
hint = "Emitted when an art style is archived."

# --- Safety Invariants ---

[[invariant]]
name = "PublishedRequiresMedium"
when = ["Published"]
assert = "has_medium"

[[invariant]]
name = "PublishedRequiresPromptTemplate"
when = ["Published"]
assert = "has_prompt_template"

[[invariant]]
name = "PublishedRequiresSlotRecipes"
when = ["Published"]
assert = "has_slot_recipes"

[[invariant]]
name = "PublishedRequiresReferenceImages"
when = ["Published"]
assert = "has_reference_images"

[[invariant]]
name = "PublishedRequiresProofShots"
when = ["Published"]
assert = "has_proof_shots"

[[invariant]]
name = "PublishedRequiresThumbnail"
when = ["Published"]
assert = "has_thumbnail"

[[invariant]]
name = "PublishedRequiresPublicAssets"
when = ["Published"]
assert = "has_published_assets"

[[invariant]]
name = "PublishedRequiresQualityReview"
when = ["Published"]
assert = "quality_review_passed"
