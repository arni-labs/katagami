# DesignLanguage — I/O Automaton Specification
#
# A complete design language with structured spec (Philosophy, Tokens, Rules,
# LayoutPrinciples, Guidance) and a TSX/Radix UI embodiment rendering
# all canonical UI elements. Legacy HTML embodiments supported via embodiment_format field.
#
# Lifecycle: Draft -> UnderReview -> Published -> Archived
#                         ^              |             |
#                         └──────────────┴─────────────┘ (Revise/Restore)
#
# Key invariants: can't Publish without all spec sections + embodiment.
# Lineage: originals, single-parent evolutions, multi-parent remixes.

[automaton]
name = "DesignLanguage"
states = ["Draft", "UnderReview", "Published", "Archived"]
initial = "Draft"

# ADR-0050 migration TODO: each state below needs either a
# [[state_timeout]] declaration or a domain-specific justification
# for being indefinite. Added as a migration allowlist to unblock
# TEMPER_LIVENESS_ENFORCE=true; revisit and tune per state.
allow_indefinite_states = ["Draft", "UnderReview", "Published", "Archived"]

# --- State Variables ---

[[state]]
name = "has_philosophy"
type = "bool"
initial = "false"

[[state]]
name = "has_tokens"
type = "bool"
initial = "false"

[[state]]
name = "has_rules"
type = "bool"
initial = "false"

[[state]]
name = "has_layout"
type = "bool"
initial = "false"

[[state]]
name = "has_guidance"
type = "bool"
initial = "false"

[[state]]
name = "has_embodiment"
type = "bool"
initial = "false"

[[state]]
name = "embodiment_verified"
type = "bool"
initial = "false"

# Compositions = the bespoke Landing + Dashboard screens. Gated identically to
# the element embodiment: attached, then finalizer-verified (files read, checked
# self-contained + tokenized, landing carries the hero slot) before publish.
[[state]]
name = "has_compositions"
type = "bool"
initial = "false"

[[state]]
name = "compositions_verified"
type = "bool"
initial = "false"

[[state]]
name = "has_design_md"
type = "bool"
initial = "false"

[[state]]
name = "has_valid_design_md"
type = "bool"
initial = "false"

[[state]]
name = "design_md_verified"
type = "bool"
initial = "false"

[[state]]
name = "has_shadcn_export"
type = "bool"
initial = "false"

[[state]]
name = "shadcn_export_verified"
type = "bool"
initial = "false"

[[state]]
name = "has_shadcn_component_spec"
type = "bool"
initial = "false"

[[state]]
name = "shadcn_component_spec_verified"
type = "bool"
initial = "false"

[[state]]
name = "has_shadcn_preview_shots"
type = "bool"
initial = "false"

[[state]]
name = "shadcn_preview_shots_verified"
type = "bool"
initial = "false"

[[state]]
name = "has_thumbnail"
type = "bool"
initial = "false"

[[state]]
name = "thumbnail_verified"
type = "bool"
initial = "false"

[[state]]
name = "has_published_assets"
type = "bool"
initial = "false"

[[state]]
name = "embodiment_format"
type = "string"
initial = "html"

[[state]]
name = "review_status"
type = "string"
initial = "unreviewed"

[[state]]
name = "quality_review_passed"
type = "bool"
initial = "false"

[[state]]
name = "featured"
type = "bool"
initial = "false"

[[state]]
name = "display_order"
type = "counter"
initial = 0

[[state]]
name = "version"
type = "counter"
initial = 0

[[state]]
name = "element_count"
type = "counter"
initial = 0

[[state]]
name = "composition_count"
type = "counter"
initial = 0

[[state]]
name = "fork_count"
type = "counter"
initial = 0

[[state]]
name = "usage_count"
type = "counter"
initial = 0

# --- Actions: Spec Authoring (Draft & UnderReview) ---

[[action]]
name = "SetName"
kind = "input"
from = ["Draft", "UnderReview"]
effect = [{ type = "set_bool", var = "has_design_md", value = "false" }, { type = "set_bool", var = "has_valid_design_md", value = "false" }, { type = "set_bool", var = "design_md_verified", value = "false" }, { type = "set_bool", var = "has_shadcn_export", value = "false" }, { type = "set_bool", var = "shadcn_export_verified", value = "false" }, { type = "set_bool", var = "has_shadcn_component_spec", value = "false" }, { type = "set_bool", var = "shadcn_component_spec_verified", value = "false" }, { type = "set_bool", var = "has_shadcn_preview_shots", value = "false" }, { type = "set_bool", var = "shadcn_preview_shots_verified", value = "false" }, { type = "set_bool", var = "has_published_assets", value = "false" }, { type = "set_bool", var = "quality_review_passed", value = "false" }]
params = ["name", "slug"]
hint = "Set the design language name and URL-safe slug."

[[action]]
name = "SetSpec"
kind = "input"
from = ["Draft", "UnderReview"]
effect = [
  { type = "set_bool", var = "has_philosophy", value = "true" },
  { type = "set_bool", var = "has_tokens", value = "true" },
  { type = "set_bool", var = "has_rules", value = "true" },
  { type = "set_bool", var = "has_layout", value = "true" },
  { type = "set_bool", var = "has_guidance", value = "true" },
  { type = "set_bool", var = "has_design_md", value = "false" },
  { type = "set_bool", var = "has_valid_design_md", value = "false" },
  { type = "set_bool", var = "design_md_verified", value = "false" },
  { type = "set_bool", var = "has_shadcn_export", value = "false" },
  { type = "set_bool", var = "shadcn_export_verified", value = "false" },
  { type = "set_bool", var = "has_shadcn_component_spec", value = "false" },
  { type = "set_bool", var = "shadcn_component_spec_verified", value = "false" },
  { type = "set_bool", var = "has_shadcn_preview_shots", value = "false" },
  { type = "set_bool", var = "shadcn_preview_shots_verified", value = "false" },
  { type = "set_bool", var = "has_published_assets", value = "false" },
  { type = "set_bool", var = "quality_review_passed", value = "false" }
]
params = ["name", "slug", "philosophy", "tokens", "rules", "layout_principles", "guidance", "tags"]
hint = "Set the complete core spec for a newly synthesized or substantially revised language in one coherent hot-path transition."

[[action]]
name = "WritePhilosophy"
kind = "input"
from = ["Draft", "UnderReview"]
effect = [{ type = "set_bool", var = "has_philosophy", value = "true" }, { type = "set_bool", var = "has_design_md", value = "false" }, { type = "set_bool", var = "has_valid_design_md", value = "false" }, { type = "set_bool", var = "design_md_verified", value = "false" }, { type = "set_bool", var = "has_shadcn_export", value = "false" }, { type = "set_bool", var = "shadcn_export_verified", value = "false" }, { type = "set_bool", var = "has_shadcn_component_spec", value = "false" }, { type = "set_bool", var = "shadcn_component_spec_verified", value = "false" }, { type = "set_bool", var = "has_shadcn_preview_shots", value = "false" }, { type = "set_bool", var = "shadcn_preview_shots_verified", value = "false" }, { type = "set_bool", var = "has_published_assets", value = "false" }, { type = "set_bool", var = "quality_review_passed", value = "false" }]
params = ["philosophy"]
hint = "Write or update the Philosophy section (values, anti-values, aesthetic lineage)."

[[action]]
name = "SetTokens"
kind = "input"
from = ["Draft", "UnderReview"]
effect = [{ type = "set_bool", var = "has_tokens", value = "true" }, { type = "set_bool", var = "has_design_md", value = "false" }, { type = "set_bool", var = "has_valid_design_md", value = "false" }, { type = "set_bool", var = "design_md_verified", value = "false" }, { type = "set_bool", var = "has_shadcn_export", value = "false" }, { type = "set_bool", var = "shadcn_export_verified", value = "false" }, { type = "set_bool", var = "has_shadcn_component_spec", value = "false" }, { type = "set_bool", var = "shadcn_component_spec_verified", value = "false" }, { type = "set_bool", var = "has_shadcn_preview_shots", value = "false" }, { type = "set_bool", var = "shadcn_preview_shots_verified", value = "false" }, { type = "set_bool", var = "has_published_assets", value = "false" }, { type = "set_bool", var = "quality_review_passed", value = "false" }]
params = ["tokens"]
hint = "Set design tokens (colors, typography, spacing, radii, shadows, elevation, motion, opacity)."

[[action]]
name = "SetRules"
kind = "input"
from = ["Draft", "UnderReview"]
effect = [{ type = "set_bool", var = "has_rules", value = "true" }, { type = "set_bool", var = "has_design_md", value = "false" }, { type = "set_bool", var = "has_valid_design_md", value = "false" }, { type = "set_bool", var = "design_md_verified", value = "false" }, { type = "set_bool", var = "has_shadcn_export", value = "false" }, { type = "set_bool", var = "shadcn_export_verified", value = "false" }, { type = "set_bool", var = "has_shadcn_component_spec", value = "false" }, { type = "set_bool", var = "shadcn_component_spec_verified", value = "false" }, { type = "set_bool", var = "has_shadcn_preview_shots", value = "false" }, { type = "set_bool", var = "shadcn_preview_shots_verified", value = "false" }, { type = "set_bool", var = "has_published_assets", value = "false" }, { type = "set_bool", var = "quality_review_passed", value = "false" }]
params = ["rules"]
hint = "Set compositional rules (how tokens combine to form elements)."

[[action]]
name = "SetLayout"
kind = "input"
from = ["Draft", "UnderReview"]
effect = [{ type = "set_bool", var = "has_layout", value = "true" }, { type = "set_bool", var = "has_design_md", value = "false" }, { type = "set_bool", var = "has_valid_design_md", value = "false" }, { type = "set_bool", var = "design_md_verified", value = "false" }, { type = "set_bool", var = "has_shadcn_export", value = "false" }, { type = "set_bool", var = "shadcn_export_verified", value = "false" }, { type = "set_bool", var = "has_shadcn_component_spec", value = "false" }, { type = "set_bool", var = "shadcn_component_spec_verified", value = "false" }, { type = "set_bool", var = "has_shadcn_preview_shots", value = "false" }, { type = "set_bool", var = "shadcn_preview_shots_verified", value = "false" }, { type = "set_bool", var = "has_published_assets", value = "false" }, { type = "set_bool", var = "quality_review_passed", value = "false" }]
params = ["layout_principles"]
hint = "Set layout principles (density, grid, whitespace, responsive)."

[[action]]
name = "SetGuidance"
kind = "input"
from = ["Draft", "UnderReview"]
effect = [{ type = "set_bool", var = "has_guidance", value = "true" }, { type = "set_bool", var = "has_design_md", value = "false" }, { type = "set_bool", var = "has_valid_design_md", value = "false" }, { type = "set_bool", var = "design_md_verified", value = "false" }, { type = "set_bool", var = "has_shadcn_export", value = "false" }, { type = "set_bool", var = "shadcn_export_verified", value = "false" }, { type = "set_bool", var = "has_shadcn_component_spec", value = "false" }, { type = "set_bool", var = "shadcn_component_spec_verified", value = "false" }, { type = "set_bool", var = "has_shadcn_preview_shots", value = "false" }, { type = "set_bool", var = "shadcn_preview_shots_verified", value = "false" }, { type = "set_bool", var = "has_published_assets", value = "false" }, { type = "set_bool", var = "quality_review_passed", value = "false" }]
params = ["guidance"]
hint = "Set guidance section (do's, don'ts, usage context)."

[[action]]
name = "SetImageryDirection"
kind = "input"
from = ["Draft", "UnderReview"]
effect = [{ type = "set_bool", var = "has_design_md", value = "false" }, { type = "set_bool", var = "has_valid_design_md", value = "false" }, { type = "set_bool", var = "design_md_verified", value = "false" }, { type = "set_bool", var = "has_shadcn_export", value = "false" }, { type = "set_bool", var = "shadcn_export_verified", value = "false" }, { type = "set_bool", var = "has_shadcn_component_spec", value = "false" }, { type = "set_bool", var = "shadcn_component_spec_verified", value = "false" }, { type = "set_bool", var = "has_shadcn_preview_shots", value = "false" }, { type = "set_bool", var = "shadcn_preview_shots_verified", value = "false" }, { type = "set_bool", var = "has_published_assets", value = "false" }, { type = "set_bool", var = "quality_review_passed", value = "false" }]
params = ["imagery_direction"]
hint = "Set imagery & illustration direction (illustration_style, hero_image_direction, icon_style, image_gen_prompts)."

[[action]]
name = "SetGenerativeCanvas"
kind = "input"
from = ["Draft", "UnderReview"]
effect = [{ type = "set_bool", var = "has_design_md", value = "false" }, { type = "set_bool", var = "has_valid_design_md", value = "false" }, { type = "set_bool", var = "design_md_verified", value = "false" }, { type = "set_bool", var = "has_shadcn_export", value = "false" }, { type = "set_bool", var = "shadcn_export_verified", value = "false" }, { type = "set_bool", var = "has_shadcn_component_spec", value = "false" }, { type = "set_bool", var = "shadcn_component_spec_verified", value = "false" }, { type = "set_bool", var = "has_shadcn_preview_shots", value = "false" }, { type = "set_bool", var = "shadcn_preview_shots_verified", value = "false" }, { type = "set_bool", var = "has_published_assets", value = "false" }, { type = "set_bool", var = "quality_review_passed", value = "false" }]
params = ["generative_canvas"]
hint = "Set generative/interactive canvas direction (WebGL techniques, canvas effects, shader palette, animation philosophy)."

# --- Actions: Embodiment ---

[[action]]
name = "AttachEmbodiment"
kind = "input"
from = ["Draft", "UnderReview"]
effect = [{ type = "set_bool", var = "has_embodiment", value = "true" }, { type = "set_bool", var = "embodiment_verified", value = "false" }, { type = "set_bool", var = "has_thumbnail", value = "false" }, { type = "set_bool", var = "thumbnail_verified", value = "false" }, { type = "set_bool", var = "has_published_assets", value = "false" }, { type = "set_bool", var = "has_design_md", value = "false" }, { type = "set_bool", var = "has_valid_design_md", value = "false" }, { type = "set_bool", var = "design_md_verified", value = "false" }, { type = "set_bool", var = "has_shadcn_export", value = "false" }, { type = "set_bool", var = "shadcn_export_verified", value = "false" }, { type = "set_bool", var = "has_shadcn_component_spec", value = "false" }, { type = "set_bool", var = "shadcn_component_spec_verified", value = "false" }, { type = "set_bool", var = "has_shadcn_preview_shots", value = "false" }, { type = "set_bool", var = "shadcn_preview_shots_verified", value = "false" }, { type = "set_bool", var = "quality_review_passed", value = "false" }]
params = ["embodiment_file_id", "element_count", "composition_count", "embodiment_format"]
hint = "Attach embodiment file. Set embodiment_format to 'tsx' for Radix TSX or 'html' for legacy HTML. Re-attaching an embodiment invalidates the derived gallery thumbnail until regenerated and verified."

[[action]]
name = "VerifyEmbodiment"
kind = "internal"
from = ["Draft", "UnderReview", "Published"]
effect = [{ type = "set_bool", var = "embodiment_verified", value = "true" }]
params = []
hint = "Mark the attached embodiment as verified after the finalizer has read the referenced file and checked that it is non-empty."

[[action]]
name = "AttachDesignMd"
kind = "input"
from = ["Draft", "UnderReview"]
effect = [{ type = "set_bool", var = "has_design_md", value = "true" }, { type = "set_bool", var = "has_valid_design_md", value = "false" }, { type = "set_bool", var = "design_md_verified", value = "false" }, { type = "set_bool", var = "has_published_assets", value = "false" }, { type = "set_bool", var = "quality_review_passed", value = "false" }]
params = ["design_md_file_id", "design_md_lint_result", "design_md_format_version"]
hint = "Attach a generated DESIGN.md artifact candidate. Published languages must Revise first because this invalidates publish-required verification booleans until the finalizer verifies the referenced file."

[[action]]
name = "VerifyDesignMd"
kind = "internal"
from = ["Draft", "UnderReview", "Published"]
effect = [{ type = "set_bool", var = "has_valid_design_md", value = "true" }, { type = "set_bool", var = "design_md_verified", value = "true" }]
params = []
hint = "Mark the attached DESIGN.md as verified after the finalizer has read the referenced file and confirmed the lint metadata."

[[action]]
name = "AttachShadcnExport"
kind = "input"
from = ["Draft", "UnderReview"]
effect = [{ type = "set_bool", var = "has_shadcn_export", value = "true" }, { type = "set_bool", var = "shadcn_export_verified", value = "false" }, { type = "set_bool", var = "quality_review_passed", value = "false" }]
params = ["shadcn_export_file_id", "shadcn_export_format_version", "shadcn_export_manifest"]
hint = "Attach a generated shadcn/ui registry:theme JSON projection. Katagami remains the source of truth; Published languages must Revise first before re-attaching this derived artifact."

[[action]]
name = "VerifyShadcnExport"
kind = "internal"
from = ["Draft", "UnderReview", "Published"]
guard = [{ type = "is_true", var = "has_shadcn_export" }]
effect = [{ type = "set_bool", var = "shadcn_export_verified", value = "true" }]
params = []
hint = "Mark the attached shadcn/ui registry theme as verified after the finalizer has read the referenced JSON file."

[[action]]
name = "AttachShadcnComponentSpec"
kind = "input"
from = ["Draft", "UnderReview"]
effect = [{ type = "set_bool", var = "has_shadcn_component_spec", value = "true" }, { type = "set_bool", var = "shadcn_component_spec_verified", value = "false" }, { type = "set_bool", var = "quality_review_passed", value = "false" }]
params = ["shadcn_component_spec_file_id", "shadcn_component_spec_format_version", "shadcn_component_spec_manifest"]
hint = "Attach the language-specific shadcn/ui component recipe artifact. This is agent-authored guidance for making shadcn primitives carry the Katagami language, not a generic token projection."

[[action]]
name = "VerifyShadcnComponentSpec"
kind = "internal"
from = ["Draft", "UnderReview", "Published"]
guard = [{ type = "is_true", var = "has_shadcn_component_spec" }]
effect = [{ type = "set_bool", var = "shadcn_component_spec_verified", value = "true" }]
params = []
hint = "Mark the attached shadcn/ui component recipe artifact as verified after the finalizer confirms it covers primitives, recipes, and usage rules."

[[action]]
name = "AttachShadcnPreviewShots"
kind = "input"
from = ["Draft", "UnderReview"]
effect = [{ type = "set_bool", var = "has_shadcn_preview_shots", value = "true" }, { type = "set_bool", var = "shadcn_preview_shots_verified", value = "false" }, { type = "set_bool", var = "quality_review_passed", value = "false" }]
params = ["shadcn_preview_shots_file_id", "shadcn_preview_shots_format_version", "shadcn_preview_shots_manifest"]
hint = "Attach the language-specific shadcn/ui preview-shot manifest describing the canonical app scenes agents should render for this language."

[[action]]
name = "VerifyShadcnPreviewShots"
kind = "internal"
from = ["Draft", "UnderReview", "Published"]
guard = [{ type = "is_true", var = "has_shadcn_preview_shots" }]
effect = [{ type = "set_bool", var = "shadcn_preview_shots_verified", value = "true" }]
params = []
hint = "Mark the shadcn/ui preview-shot manifest as verified after the finalizer confirms it names concrete shots, components, and visual intent."

[[action]]
name = "AttachThumbnail"
kind = "input"
from = ["Draft", "UnderReview"]
effect = [{ type = "set_bool", var = "has_thumbnail", value = "true" }, { type = "set_bool", var = "thumbnail_verified", value = "false" }, { type = "set_bool", var = "has_published_assets", value = "false" }]
params = ["thumbnail_file_id"]
hint = "Attach or update the static desktop gallery thumbnail image. The finalizer must VerifyThumbnail after it confirms the referenced file is an image payload."

[[action]]
name = "VerifyThumbnail"
kind = "internal"
from = ["Draft", "UnderReview", "Published"]
guard = [{ type = "is_true", var = "has_thumbnail" }]
effect = [{ type = "set_bool", var = "thumbnail_verified", value = "true" }]
params = []
hint = "Mark the attached thumbnail as verified after the finalizer has read the referenced file and confirmed it is an image payload."

[[action]]
name = "AttachVerifiedThumbnail"
kind = "internal"
from = ["Draft", "UnderReview"]
effect = [{ type = "set_bool", var = "has_thumbnail", value = "true" }, { type = "set_bool", var = "thumbnail_verified", value = "true" }, { type = "set_bool", var = "has_published_assets", value = "false" }]
params = ["thumbnail_file_id"]
hint = "Attach a thumbnail that the finalizer or backfill job has already validated. Published languages must Revise first because changing source media invalidates public artifacts."

[[action]]
name = "AttachPublishedAssets"
kind = "internal"
from = ["Draft", "UnderReview", "Published"]
effect = [{ type = "set_bool", var = "has_published_assets", value = "true" }]
params = ["thumbnail_asset_id", "thumbnail_asset_url", "embodiment_asset_id", "embodiment_asset_url", "design_md_asset_id", "design_md_asset_url"]
hint = "Attach immutable public artifact URLs created by the generic Temper publish-artifact flow. PawFS file ids remain the governed source artifacts; asset URLs are the public serving plane for thumbnails, embodiments, and DESIGN.md."

[[action]]
name = "AttachTasteVector"
kind = "internal"
from = ["Draft", "UnderReview", "Published"]
params = ["taste_vector", "taste_vector_model"]
hint = "Attach the semantic taste embedding computed from the language's canonical taste document (name, tags, philosophy summary, typography, palette). taste_vector is a JSON float array; taste_vector_model identifies the embedding model so mixed-model vectors are never compared. Written by the curation finalizer after quality review, or by the backfill job."

# --- Actions: Classification ---

[[action]]
name = "SetTaxonomy"
kind = "input"
from = ["Draft", "UnderReview", "Published"]
params = ["taxonomy_ids"]
hint = "Assign taxonomy categories to this design language."

[[action]]
name = "SetTags"
kind = "input"
from = ["Draft", "UnderReview", "Published"]
params = ["tags"]
hint = "Set freeform tags for discovery and search."

[[action]]
name = "SetFeatured"
kind = "input"
from = ["Draft", "UnderReview", "Published"]
params = ["featured", "display_order"]
hint = "Set featured status and display order for gallery sorting."

[[action]]
name = "AddCuratorNotes"
kind = "input"
from = ["Draft", "UnderReview"]
params = ["curator_notes"]
hint = "Add curator feedback notes to a draft or under-review language."

[[action]]
name = "SetSources"
kind = "input"
from = ["Draft", "UnderReview"]
params = ["source_ids"]
hint = "Link DesignSource entities that informed this language."

[[action]]
name = "AttachCompositions"
kind = "input"
from = ["Draft", "UnderReview"]
effect = [{ type = "set_bool", var = "has_compositions", value = "true" }, { type = "set_bool", var = "compositions_verified", value = "false" }, { type = "set_bool", var = "has_published_assets", value = "false" }, { type = "set_bool", var = "quality_review_passed", value = "false" }]
params = ["landing_file_id", "dashboard_file_id"]
hint = "Attach the language's bespoke composition embodiments: a Landing and a Dashboard screen (self-contained HTML, tokenized with color CSS vars + a full-bleed {--hero-image} slot on the landing). Authored uniquely per language alongside the element embodiment, following the same taste rules. These are what the Remix Studio recolors + fills. Re-attaching invalidates quality review + published assets until re-verified. To replace compositions on a Published language, Revise first."

[[action]]
name = "VerifyCompositions"
kind = "internal"
from = ["Draft", "UnderReview", "Published"]
effect = [{ type = "set_bool", var = "compositions_verified", value = "true" }]
params = []
hint = "Mark the Landing + Dashboard compositions verified after the finalizer has read both files and checked each is self-contained, tokenized HTML (color vars + the landing's hero slot)."

# --- Actions: Lineage ---

[[action]]
name = "SetLineage"
kind = "input"
from = ["Draft"]
params = ["parent_ids", "lineage_type", "generation_number"]
hint = "Set lineage: parent_ids=[] for originals, single parent for evolution, multiple for remix."

# --- Actions: Review Lifecycle ---

[[action]]
name = "SubmitForReview"
kind = "internal"
from = ["Draft"]
to = "UnderReview"
guard = [{ type = "is_true", var = "has_philosophy" }, { type = "is_true", var = "has_tokens" }, { type = "is_true", var = "has_rules" }, { type = "is_true", var = "has_layout" }, { type = "is_true", var = "has_guidance" }, { type = "is_true", var = "has_embodiment" }, { type = "is_true", var = "embodiment_verified" }, { type = "is_true", var = "has_compositions" }, { type = "is_true", var = "compositions_verified" }, { type = "is_true", var = "has_thumbnail" }, { type = "is_true", var = "thumbnail_verified" }, { type = "is_true", var = "has_design_md" }, { type = "is_true", var = "has_valid_design_md" }, { type = "is_true", var = "design_md_verified" }, { type = "is_true", var = "has_shadcn_export" }, { type = "is_true", var = "shadcn_export_verified" }, { type = "is_true", var = "has_shadcn_component_spec" }, { type = "is_true", var = "shadcn_component_spec_verified" }, { type = "is_true", var = "has_shadcn_preview_shots" }, { type = "is_true", var = "shadcn_preview_shots_verified" }, { type = "cross_entity_state", entity_type = "File", entity_id_source = "embodiment_file_id", required_status = ["Ready", "Locked"] }, { type = "cross_entity_state", entity_type = "File", entity_id_source = "landing_file_id", required_status = ["Ready", "Locked"] }, { type = "cross_entity_state", entity_type = "File", entity_id_source = "dashboard_file_id", required_status = ["Ready", "Locked"] }, { type = "cross_entity_state", entity_type = "File", entity_id_source = "thumbnail_file_id", required_status = ["Ready", "Locked"] }, { type = "cross_entity_state", entity_type = "File", entity_id_source = "design_md_file_id", required_status = ["Ready", "Locked"] }, { type = "cross_entity_state", entity_type = "File", entity_id_source = "shadcn_export_file_id", required_status = ["Ready", "Locked"] }, { type = "cross_entity_state", entity_type = "File", entity_id_source = "shadcn_component_spec_file_id", required_status = ["Ready", "Locked"] }, { type = "cross_entity_state", entity_type = "File", entity_id_source = "shadcn_preview_shots_file_id", required_status = ["Ready", "Locked"] }]
hint = "Submit for curator review. Requires all five spec sections, a finalizer-verified embodiment file, finalizer-verified Landing + Dashboard compositions, and a verified gallery thumbnail. Cross-entity guards require the embodiment, Landing, Dashboard, and thumbnail Files to be Ready (bytes durably stored) so an unready/404 file cannot leave Draft."

[[action]]
name = "Publish"
kind = "internal"
from = ["UnderReview"]
to = "Published"
guard = [{ type = "is_true", var = "has_philosophy" }, { type = "is_true", var = "has_tokens" }, { type = "is_true", var = "has_rules" }, { type = "is_true", var = "has_layout" }, { type = "is_true", var = "has_guidance" }, { type = "is_true", var = "has_embodiment" }, { type = "is_true", var = "embodiment_verified" }, { type = "is_true", var = "has_compositions" }, { type = "is_true", var = "compositions_verified" }, { type = "is_true", var = "has_thumbnail" }, { type = "is_true", var = "thumbnail_verified" }, { type = "is_true", var = "has_design_md" }, { type = "is_true", var = "has_valid_design_md" }, { type = "is_true", var = "design_md_verified" }, { type = "is_true", var = "has_shadcn_export" }, { type = "is_true", var = "shadcn_export_verified" }, { type = "is_true", var = "has_shadcn_component_spec" }, { type = "is_true", var = "shadcn_component_spec_verified" }, { type = "is_true", var = "has_shadcn_preview_shots" }, { type = "is_true", var = "shadcn_preview_shots_verified" }, { type = "is_true", var = "quality_review_passed" }, { type = "is_true", var = "has_published_assets" }, { type = "cross_entity_state", entity_type = "File", entity_id_source = "thumbnail_file_id", required_status = ["Ready", "Locked"] }, { type = "cross_entity_state", entity_type = "File", entity_id_source = "embodiment_file_id", required_status = ["Ready", "Locked"] }, { type = "cross_entity_state", entity_type = "File", entity_id_source = "landing_file_id", required_status = ["Ready", "Locked"] }, { type = "cross_entity_state", entity_type = "File", entity_id_source = "dashboard_file_id", required_status = ["Ready", "Locked"] }, { type = "cross_entity_state", entity_type = "File", entity_id_source = "design_md_file_id", required_status = ["Ready", "Locked"] }, { type = "cross_entity_state", entity_type = "File", entity_id_source = "shadcn_export_file_id", required_status = ["Ready", "Locked"] }, { type = "cross_entity_state", entity_type = "File", entity_id_source = "shadcn_component_spec_file_id", required_status = ["Ready", "Locked"] }, { type = "cross_entity_state", entity_type = "File", entity_id_source = "shadcn_preview_shots_file_id", required_status = ["Ready", "Locked"] }]
effect = [{ type = "increment", field = "version" }]
hint = "Curator approves and publishes. Requires verified spec sections, embodiment, Landing + Dashboard compositions, thumbnail, DESIGN.md, shadcn/ui export, shadcn component recipes, preview shots, public assets, and quality review."

[[action]]
name = "Revise"
kind = "input"
from = ["Published"]
to = "UnderReview"
params = ["curator_notes"]
hint = "Pull a published language back for revision with stated rationale."

[[action]]
name = "Archive"
kind = "internal"
from = ["Draft", "UnderReview", "Published"]
to = "Archived"
params = ["curator_notes"]
hint = "Archive a malformed, test, superseded, or published design language while preserving a governed restore path for accidental archival recovery."

[[action]]
name = "Restore"
kind = "input"
from = ["Archived"]
to = "UnderReview"
params = ["curator_notes"]
hint = "Restore an archived design language into review so the finalizer can re-verify artifacts and publish through normal guards."

# --- Actions: Quality & Usage Signals ---

[[action]]
name = "UpdateQuality"
kind = "input"
from = ["UnderReview", "Published"]
params = ["quality_score", "review_status"]
hint = "Update quality score and/or review status (unreviewed, reviewed, needs_revision)."

[[action]]
name = "MarkQualityPassed"
kind = "internal"
from = ["UnderReview", "Published"]
effect = [{ type = "set_bool", var = "quality_review_passed", value = "true" }]
params = []
hint = "Mark quality review as passed after finalizer-side artifact and state validation."

[[action]]
name = "IncrementUsage"
kind = "input"
from = ["Published"]
effect = "increment usage_count"
hint = "Record that an agent used this design language to build a UI."

[[action]]
name = "IncrementFork"
kind = "input"
from = ["Published"]
effect = "increment fork_count"
hint = "Record that a child language was forked from this one."

# --- Output Actions ---

[[action]]
name = "LanguagePublishedEvent"
kind = "output"
hint = "Emitted when a design language is published."

[[action]]
name = "LanguageArchivedEvent"
kind = "output"
hint = "Emitted when a design language is archived."

# --- Safety Invariants ---

[[invariant]]
name = "PublishedRequiresEmbodiment"
when = ["Published"]
assert = "has_embodiment"

[[invariant]]
name = "PublishedRequiresVerifiedEmbodiment"
when = ["Published"]
assert = "embodiment_verified"

[[invariant]]
name = "PublishedRequiresCompositions"
when = ["Published"]
assert = "has_compositions"

[[invariant]]
name = "PublishedRequiresVerifiedCompositions"
when = ["Published"]
assert = "compositions_verified"

[[invariant]]
name = "PublishedRequiresThumbnail"
when = ["Published"]
assert = "has_thumbnail"

[[invariant]]
name = "PublishedRequiresVerifiedThumbnail"
when = ["Published"]
assert = "thumbnail_verified"

[[invariant]]
name = "PublishedRequiresAllSections"
when = ["Published"]
assert = "has_philosophy && has_tokens && has_rules && has_layout && has_guidance"

[[invariant]]
name = "PublishedRequiresValidDesignMd"
when = ["Published"]
assert = "has_valid_design_md"

[[invariant]]
name = "PublishedRequiresVerifiedDesignMd"
when = ["Published"]
assert = "design_md_verified"

[[invariant]]
name = "PublishedRequiresPublicAssets"
when = ["Published"]
assert = "has_published_assets"

[[invariant]]
name = "PublishedRequiresQualityReview"
when = ["Published"]
assert = "quality_review_passed"
