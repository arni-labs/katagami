<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- Bespoke dashboard embodiment · Swiss Grid System. Color tokens injected by studio. -->
<style>
  :root{
    --bg:#ffffff; --surface:#f5f5f5; --text:#111111; --muted:#666666;
    --border:#e0e0e0; --accent:#d72638; --on-accent:#ffffff;
    --success:#1b998b; --warning:#e9c46a; --error:#d72638; --info:#2a6f97;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--text);font-family:"Helvetica Neue",Arial,sans-serif;line-height:1.45}
  .app{display:grid;grid-template-columns:220px 1fr;min-height:100vh}
  aside{border-right:1px solid var(--text);padding:24px 0}
  aside .brand{font-weight:700;font-size:16px;letter-spacing:-.01em;padding:0 22px 22px}
  aside a{display:block;padding:9px 22px;font-size:13px;font-weight:500;color:var(--muted);border-left:2px solid transparent}
  aside a.on{color:var(--text);border-left-color:var(--accent);font-weight:700}
  main{padding:0}
  .bar{display:flex;align-items:center;justify-content:space-between;padding:18px 28px;border-bottom:1px solid var(--text)}
  .bar h1{font-size:22px;letter-spacing:-.02em;font-weight:700}
  .bar .btn{background:var(--accent);color:var(--on-accent);padding:9px 18px;font-size:13px;font-weight:700}
  .stats{display:grid;grid-template-columns:repeat(3,1fr)}
  .stats .c{padding:22px 28px;border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
  .stats .c .l{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .stats .c .n{font-size:38px;font-weight:700;letter-spacing:-.03em;margin-top:6px}
  .stats .c .d{height:3px;margin-top:12px}
  .panel{padding:24px 28px}
  .panel h3{font-size:12px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:18px}
  .chart{display:flex;align-items:flex-end;gap:14px;height:170px;border-bottom:1px solid var(--text);padding-bottom:0}
  .chart .b{flex:1;background:var(--accent)}
  table{width:100%;border-collapse:collapse;margin-top:26px;font-size:13px}
  th,td{text-align:left;padding:11px 8px;border-bottom:1px solid var(--border)}
  th{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700;border-bottom:1px solid var(--text)}
  .tag{display:inline-block;font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:2px 8px;border:1px solid var(--border)}
</style>
</head>
<body>
  <div class="app">
    <aside>
      <div class="brand">SWISS</div>
      <a class="on">Overview</a><a>Reports</a><a>Segments</a><a>Sources</a><a>Settings</a>
    </aside>
    <main>
      <div class="bar"><h1>Overview</h1><span class="btn">Export</span></div>
      <div class="stats">
        <div class="c"><div class="l">Revenue</div><div class="n">$48.2k</div><div class="d" style="background:var(--success)"></div></div>
        <div class="c"><div class="l">Active</div><div class="n">1,284</div><div class="d" style="background:var(--accent)"></div></div>
        <div class="c"><div class="l">Churn</div><div class="n">2.1%</div><div class="d" style="background:var(--warning)"></div></div>
      </div>
      <div class="panel">
        <h3>Weekly activity</h3>
        <div class="chart">
          <div class="b" style="height:54%"></div><div class="b" style="height:36%"></div><div class="b" style="height:78%"></div><div class="b" style="height:48%"></div><div class="b" style="height:92%"></div><div class="b" style="height:66%"></div><div class="b" style="height:40%"></div>
        </div>
        <table>
          <thead><tr><th>Source</th><th>Sessions</th><th>Conv.</th><th>Status</th></tr></thead>
          <tbody>
            <tr><td>Organic</td><td>8,420</td><td>4.2%</td><td><span class="tag" style="color:var(--success);border-color:var(--success)">Up</span></td></tr>
            <tr><td>Referral</td><td>3,180</td><td>3.1%</td><td><span class="tag" style="color:var(--info);border-color:var(--info)">Flat</span></td></tr>
            <tr><td>Paid</td><td>1,902</td><td>2.4%</td><td><span class="tag" style="color:var(--warning);border-color:var(--warning)">Watch</span></td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>
</body>
</html>
