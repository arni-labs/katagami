# CurationQuery — I/O Automaton Specification
#
# End-to-end pipeline tracker for automated curation output creation.
# A user submits a text query, and the system automatically runs the matching
# lane:
# design_language → research → synthesize (with embodiment) → taxonomy → publish
# palette/art_style → research → lane synthesis → publish
#
# Lifecycle: Submitted -> Researching -> Synthesizing -> Organizing -> Completed | Failed
#
# Submit triggers launch_research WASM which creates the first CurationJob.
# Subsequent state transitions are driven by reactions on typed CurationJob
# completion actions.

[automaton]
name = "CurationQuery"
states = ["Submitted", "Researching", "Synthesizing", "Organizing", "Completed", "Failed"]
initial = "Submitted"
allow_indefinite_states = ["Submitted", "Completed", "Failed"]

# --- State Variables ---

# The user's free-text design query (e.g., "Japanese woodblock prints meets brutalism")
[[state]]
name = "query_text"
type = "string"
initial = ""

# Explicit output lane. "auto" means launch_research infers the lane from
# query_text and records the normalized value before source_search starts.
[[state]]
name = "output_type"
type = "string"
initial = "auto"

# CurationJob IDs for each pipeline stage
[[state]]
name = "source_search_job_id"
type = "string"
initial = ""

[[state]]
name = "synthesize_job_id"
type = "string"
initial = ""

[[state]]
name = "direction_ids"
type = "string"
initial = "[]"

[[state]]
name = "synthesize_job_ids"
type = "string"
initial = "[]"

[[state]]
name = "quality_review_job_ids"
type = "string"
initial = "[]"

[[state]]
name = "organize_job_ids"
type = "string"
initial = "[]"

# Tracks the job currently driving the organizing stage, which may start
# with a quality review job before taxonomy organization completes.
[[state]]
name = "organize_job_id"
type = "string"
initial = ""

# JSON array of DesignLanguage entity IDs created by this query
[[state]]
name = "design_language_ids"
type = "string"
initial = "[]"

# JSON arrays of terminal non-language lane entities created by this query
[[state]]
name = "palette_system_ids"
type = "string"
initial = "[]"

[[state]]
name = "art_style_ids"
type = "string"
initial = "[]"

# Error details if pipeline failed
[[state]]
name = "error_message"
type = "string"
initial = ""

# Shared workspace for all jobs in this query
[[state]]
name = "workspace_id"
type = "string"
initial = ""

# --- Actions ---

[[action]]
name = "Configure"
kind = "input"
from = ["Submitted"]
params = ["query_text", "output_type"]
hint = "Set the query text and optionally force output_type: auto, design_language, palette, or art_style."

[[action]]
name = "SetOutputType"
kind = "input"
from = ["Submitted"]
params = ["output_type"]
hint = "Optionally force the query output lane before submission."

[[action]]
name = "Submit"
kind = "input"
from = ["Submitted"]
to = "Researching"
hint = "Launch the automated pipeline. Triggers launch_research WASM."
effect = [{ type = "trigger", name = "launch_research" }]

# ADR-0046: inline trigger — migrated from [[integration]] below.
# Post-parse expansion re-synthesizes the equivalent Integration so
# the existing WASM runtime handles execution unchanged.
[[action.triggers]]
name = "launch_research"
kind = "wasm"
module = "launch_research"
on_failure = "Fail"

[action.triggers.config]
temper_api_url = "{secret:temper_api_url}"

[[action]]
name = "ResearchComplete"
kind = "input"
from = ["Researching"]
to = "Synthesizing"
params = ["source_search_job_id", "synthesize_job_id", "direction_ids", "synthesize_job_ids"]
hint = "Research phase completed. CurationDirection records have queued synthesis jobs."

[[action]]
name = "SynthesisComplete"
kind = "input"
from = ["Synthesizing"]
to = "Organizing"
params = ["design_language_ids", "organize_job_id", "quality_review_job_ids"]
hint = "Synthesis completed. Quality review is now driving the organizing stage."

[[action]]
name = "PaletteSynthesisComplete"
kind = "input"
from = ["Synthesizing"]
to = "Completed"
params = ["palette_system_ids"]
hint = "Palette lane synthesis completed. PaletteSystem records have been verified and published."

[[action]]
name = "ArtStyleSynthesisComplete"
kind = "input"
from = ["Synthesizing"]
to = "Completed"
params = ["art_style_ids"]
hint = "Art-style lane synthesis completed. ArtStyle records have been verified and published."

[[action]]
name = "OrganizationComplete"
kind = "input"
from = ["Organizing"]
to = "Completed"
hint = "Taxonomy organization finished. Pipeline complete."

[[action]]
name = "Fail"
kind = "input"
from = ["Submitted", "Researching", "Synthesizing", "Organizing"]
to = "Failed"
params = ["error_message"]
hint = "Pipeline failed at any stage."

[[state_timeout]]
state = "Researching"
after_seconds = 7200
on_timeout = "Fail"
params = { error_message = "CurationQuery remained Researching for 2h without source-search completion." }

[[state_timeout]]
state = "Synthesizing"
after_seconds = 14400
on_timeout = "Fail"
params = { error_message = "CurationQuery remained Synthesizing for 4h without synthesis completion." }

[[state_timeout]]
state = "Organizing"
after_seconds = 14400
on_timeout = "Fail"
params = { error_message = "CurationQuery remained Organizing for 4h without organization completion." }

# --- Invariants ---

[[invariant]]
name = "CompletedIsFinal"
when = ["Completed"]
assert = "no_further_transitions"

[[invariant]]
name = "FailedIsFinal"
when = ["Failed"]
assert = "no_further_transitions"
