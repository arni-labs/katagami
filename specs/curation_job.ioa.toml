# --- Finalizing ---

[[action]]
name = "PublishResearchCompletion"
kind = "internal"
from = ["Finalizing"]
to = "Completed"
params = ["followup_job_id"]
hint = "Validator-gated research completion. Runs only after source-search contract validation."

[[action.triggers]]
name = "validated_research_completion_advances_query"
kind = "entity"
principal = "curation-service"
target_entity = "CurationQuery"
target_action = "ResearchComplete"

[action.triggers.params]
synthesize_job_ids = "[]"

[action.triggers.params_from]
source_search_job_id = "Id"
direction_ids = "direction_ids"
synthesize_job_id = "followup_job_id"

[action.triggers.resolve_target]
type = "field"
field = "query_id"

[[action]]
name = "PublishSynthesisCompletion"
kind = "internal"
from = ["Finalizing"]
to = "Completed"
params = ["design_language_ids", "followup_job_id"]
hint = "Validator-gated synthesis completion. Creates review work and advances the parent query only after the synthesis contract passes."

[[action.triggers]]
name = "validated_synthesis_completes_direction"
kind = "entity"
principal = "curation-service"
target_entity = "CurationDirection"
target_action = "Complete"

[action.triggers.params_from]
design_language_ids = "design_language_ids"

[action.triggers.resolve_target]
type = "field"
field = "direction_id"

[[action.triggers]]
name = "validated_synthesis_completion_advances_query"
kind = "entity"
principal = "curation-service"
target_entity = "CurationQuery"
target_action = "SynthesisComplete"

[action.triggers.params]
quality_review_job_ids = "[]"

[action.triggers.params_from]
design_language_ids = "design_language_ids"
organize_job_id = "followup_job_id"

[action.triggers.resolve_target]
type = "field"
field = "query_id"

[[action]]
name = "PublishOrganizationCompletion"
kind = "internal"
from = ["Finalizing"]
to = "Completed"
params = []
hint = "Validator-gated organization completion. Advances the parent query only after organization validation."

[[action.triggers]]
name = "validated_organization_completion_finishes_query"
kind = "entity"
principal = "curation-service"
target_entity = "CurationQuery"
target_action = "OrganizationComplete"

[action.triggers.resolve_target]
type = "field"
field = "query_id"

[[action]]
name = "FinalizeCompletion"
kind = "internal"
from = ["Finalizing"]
to = "Completed"
params = ["followup_job_id", "design_language_ids"]
hint = "Finalize job completion after session recording and trigger-native follow-up dispatch."

[[action]]
name = "RepairRequired"
kind = "internal"
from = ["Finalizing"]
to = "Ready"
params = ["error_message", "retry_attempts", "input"]
hint = "Validator found repairable contract defects. Re-enter the same CurationJob with exact defects and existing artifact IDs instead of advancing or creating duplicates."
effect = [{ type = "trigger", name = "build_session_message" }]

[[action.triggers]]
name = "build_session_message"
kind = "wasm"
module = "build_session_message"
timeout_secs = "300"
on_failure = "Fail"

[action.triggers.config]
temper_api_url = "{secret:temper_api_url}"
sandbox_provider = "{secret:sandbox_provider}"
llm_model = "{secret:llm_model}"
llm_provider = "{secret:llm_provider}"

[[action]]
name = "Fail"
kind = "input"
from = ["Queued", "Ready", "Running", "Finalizing"]
to = "Failed"
params = ["error_message"]
hint = "Mark job as failed with error details."
effect = [{ type = "trigger", name = "finalize_spawned_session" }]

# ADR-0046: inline trigger — migrated from [[integration]] below.
# Post-parse expansion re-synthesizes the equivalent Integration so
# the existing WASM runtime handles execution unchanged.
[[action.triggers]]
name = "finalize_spawned_session"
kind = "wasm"
module = "finalize_spawned_session"
timeout_secs = "300"

[action.triggers.config]
temper_api_url = "{secret:temper_api_url}"

[[state_timeout]]
state = "Queued"
after_seconds = 900
on_timeout = "Fail"
params = { error_message = "CurationJob remained Queued for 15m without submission." }

[[state_timeout]]
state = "Ready"
after_seconds = 900
on_timeout = "Fail"
params = { error_message = "CurationJob remained Ready for 15m without a spawned Session." }

[[state_timeout]]
state = "Running"
after_seconds = 7200
on_timeout = "Fail"
params = { error_message = "CurationJob remained Running for 2h without self-reporting completion." }

[[state_timeout]]
state = "Finalizing"
after_seconds = 900
on_timeout = "Fail"
params = { error_message = "CurationJob remained Finalizing for 15m without completing finalization." }

# --- Retry ---

[[action]]
name = "Retry"
kind = "input"
from = ["Failed"]
to = "Queued"
params = ["error_message", "retry_attempts"]
hint = "Retry a failed job. Resets to Queued for re-submission."

# --- Invariants ---

[[invariant]]
name = "CompletedIsFinal"
when = ["Completed"]
assert = "no_further_transitions"
