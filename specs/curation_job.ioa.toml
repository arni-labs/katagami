# CurationJob - I/O Automaton Specification
#
# Agent task queue for Katagami curation. New jobs use typed completion
# actions and reactions for follow-up orchestration. The legacy
# Complete(output) action remains for one compatibility window so already
# running sessions can finish safely.

[automaton]
name = "CurationJob"
states = ["Queued", "Ready", "Running", "Finalizing", "Completed", "Failed"]
initial = "Queued"
allow_indefinite_states = ["Completed", "Failed"]

# --- State Variables ---

[[state]]
name = "job_type"
type = "string"
initial = ""

[[state]]
name = "design_language_id"
type = "string"
initial = ""

[[state]]
name = "direction_id"
type = "string"
initial = ""

[[state]]
name = "workspace_id"
type = "string"
initial = ""

[[state]]
name = "input"
type = "string"
initial = "{}"

[[state]]
name = "output"
type = "string"
initial = "{}"

[[state]]
name = "followup_job_id"
type = "string"
initial = ""

[[state]]
name = "direction_ids"
type = "string"
initial = "[]"

[[state]]
name = "design_language_ids"
type = "string"
initial = "[]"

[[state]]
name = "review_input"
type = "string"
initial = "{}"

[[state]]
name = "organize_input"
type = "string"
initial = "{}"

[[state]]
name = "taste_rule_ids"
type = "string"
initial = "[]"

[[state]]
name = "report_file_id"
type = "string"
initial = ""

[[state]]
name = "progress_log"
type = "string"
initial = "[]"

[[state]]
name = "error_message"
type = "string"
initial = ""

[[state]]
name = "retry_attempts"
type = "string"
initial = "0"

[[state]]
name = "query_id"
type = "string"
initial = ""

[[state]]
name = "completion_contract"
type = "string"
initial = "typed-v1"

[[state]]
name = "inline_job_docs"
type = "bool"
initial = "false"

# --- Session spawning fields ---

[[state]]
name = "soul_id"
type = "string"
initial = "curator"

[[state]]
name = "model"
type = "string"
initial = ""

[[state]]
name = "provider"
type = "string"
initial = ""

[[state]]
name = "tools_enabled"
type = "string"
initial = "temper_get,temper_list,temper_create,temper_action,temper_write,temper_read,temper_web_search,temper_web_fetch"

[[state]]
name = "max_turns"
type = "string"
initial = "250"

[[state]]
name = "user_message"
type = "string"
initial = ""

[[state]]
name = "session_id"
type = "string"
initial = ""

# --- Queued ---

[[action]]
name = "Configure"
kind = "input"
from = ["Queued"]
params = ["job_type", "design_language_id", "direction_id", "workspace_id", "input", "model", "provider", "soul_id", "max_turns", "tools_enabled", "query_id", "completion_contract", "inline_job_docs"]
hint = "Set or update job parameters before execution."

[[action]]
name = "ConfigureAndSubmit"
kind = "internal"
from = ["Queued"]
to = "Ready"
params = ["job_type", "design_language_id", "direction_id", "workspace_id", "input", "model", "provider", "soul_id", "max_turns", "tools_enabled", "query_id", "completion_contract", "inline_job_docs"]
hint = "Configure a trigger-created job and start session spawning in one transition."
effect = [{ type = "trigger", name = "build_session_message" }]

# ADR-0046: inline trigger — migrated from [[integration]] below.
# Post-parse expansion re-synthesizes the equivalent Integration so
# the existing WASM runtime handles execution unchanged.
[[action.triggers]]
name = "build_session_message"
kind = "wasm"
module = "build_session_message"
timeout_secs = "300"
on_failure = "Fail"

[action.triggers.config]
temper_api_url = "{secret:temper_api_url}"
sandbox_provider = "{secret:sandbox_provider}"
llm_model = "{secret:llm_model}"
llm_provider = "{secret:llm_provider}"

[[action]]
name = "Submit"
kind = "input"
from = ["Queued"]
to = "Ready"
hint = "Legacy/manual start path. Triggers message builder WASM."
effect = [{ type = "trigger", name = "build_session_message" }]

# ADR-0046: inline trigger — migrated from [[integration]] below.
# Post-parse expansion re-synthesizes the equivalent Integration so
# the existing WASM runtime handles execution unchanged.
[[action.triggers]]
name = "build_session_message"
kind = "wasm"
module = "build_session_message"
timeout_secs = "300"
on_failure = "Fail"

[action.triggers.config]
temper_api_url = "{secret:temper_api_url}"
sandbox_provider = "{secret:sandbox_provider}"
llm_model = "{secret:llm_model}"
llm_provider = "{secret:llm_provider}"

[[action]]
name = "Start"
kind = "input"
from = ["Queued"]
to = "Running"
params = []
hint = "Begin executing this job directly without session spawning."

# --- Ready ---

[[action]]
name = "SessionSpawned"
kind = "input"
from = ["Ready"]
to = "Running"
params = ["session_id", "workspace_id"]
hint = "Session has been created, attached to the shared workspace, and is running."

[[action]]
name = "ChildSessionCompleted"
kind = "input"
from = ["Running"]
to = "Finalizing"
params = ["output", "child_session_id", "ChildSessionId", "child_status", "ChildStatus"]
hint = "A linked child Session reached Completed without self-reporting a typed CurationJob completion. The finalizer validates actual artifacts and resumes review/repair instead of leaving the job Running."
effect = [{ type = "trigger", name = "finalize_spawned_session" }]

[[action.triggers]]
name = "finalize_spawned_session"
kind = "wasm"
module = "finalize_spawned_session"
timeout_secs = "300"

[action.triggers.config]
temper_api_url = "{secret:temper_api_url}"

# --- Running ---

[[action]]
name = "RecordProgress"
kind = "input"
from = ["Running"]
params = ["progress_log"]
hint = "Append incremental progress entries during execution."

[[action]]
name = "Complete"
kind = "input"
from = ["Running"]
to = "Finalizing"
params = ["output"]
hint = "Legacy compatibility completion. New jobs should use typed completion actions."
effect = [{ type = "trigger", name = "finalize_spawned_session" }]

# ADR-0046: inline trigger — migrated from [[integration]] below.
