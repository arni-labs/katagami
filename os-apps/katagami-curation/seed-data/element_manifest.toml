  {"key": "nav.footer", "category": "navigation", "name": "Footer", "description": "Page footer with links and info", "required": true},
  {"key": "nav.mobile-nav", "category": "navigation", "name": "Mobile Nav", "description": "Responsive mobile navigation (hamburger, bottom bar)", "required": true},

  {"key": "containers.card", "category": "containers", "name": "Card", "description": "Content card with header, body, footer", "required": true},
  {"key": "containers.modal", "category": "containers", "name": "Modal", "description": "Overlay dialog with backdrop", "required": true},
  {"key": "containers.drawer", "category": "containers", "name": "Drawer", "description": "Slide-out panel (left/right)", "required": true},
  {"key": "containers.sheet", "category": "containers", "name": "Sheet", "description": "Bottom sheet for mobile contexts", "required": false},
  {"key": "containers.accordion", "category": "containers", "name": "Accordion", "description": "Expandable/collapsible sections", "required": true},
  {"key": "containers.popover", "category": "containers", "name": "Popover", "description": "Anchored content popup", "required": true},
  {"key": "containers.divider", "category": "containers", "name": "Divider", "description": "Horizontal/vertical content separator", "required": true},
  {"key": "containers.section", "category": "containers", "name": "Section", "description": "Page section with heading and content area", "required": true},

  {"key": "data.table", "category": "data", "name": "Table", "description": "Data table with sorting, selection, pagination", "required": true},
  {"key": "data.list", "category": "data", "name": "List", "description": "Vertical list with items, icons, actions", "required": true},
  {"key": "data.stat-card", "category": "data", "name": "Stat Card", "description": "Key metric display with label, value, trend", "required": true},
  {"key": "data.chart-bar", "category": "data", "name": "Bar Chart", "description": "Vertical/horizontal bar chart", "required": true},
  {"key": "data.chart-line", "category": "data", "name": "Line Chart", "description": "Time series line chart", "required": true},
  {"key": "data.chart-pie", "category": "data", "name": "Pie Chart", "description": "Pie/donut chart", "required": false},
  {"key": "data.timeline", "category": "data", "name": "Timeline", "description": "Chronological event timeline", "required": false},
  {"key": "data.avatar", "category": "data", "name": "Avatar", "description": "User avatar (image, initials, icon)", "required": true},

  {"key": "forms.login", "category": "forms", "name": "Login Form", "description": "Email/password login with validation and social options", "required": true},
  {"key": "forms.signup", "category": "forms", "name": "Signup Form", "description": "Registration form with field validation", "required": true},
  {"key": "forms.contact", "category": "forms", "name": "Contact Form", "description": "Name, email, message contact form", "required": true},
  {"key": "forms.settings", "category": "forms", "name": "Settings Form", "description": "Settings page with grouped controls", "required": true},
  {"key": "forms.checkout", "category": "forms", "name": "Checkout Form", "description": "Multi-step or single-page checkout", "required": false}
]
'''

[[instance.actions]]
name = "SetCompositions"

[instance.actions.params]
composition_count = 5
compositions = '''
[
  {"key": "compositions.dashboard", "name": "Dashboard", "description": "Full dashboard layout with sidebar nav, stat cards, charts, and data table"},
  {"key": "compositions.landing", "name": "Landing Page", "description": "Marketing landing page with hero, features, testimonials, CTA, footer"},
  {"key": "compositions.settings-page", "name": "Settings Page", "description": "App settings page with sidebar navigation and grouped form controls"},
  {"key": "compositions.auth-page", "name": "Auth Page", "description": "Authentication page with centered form, branding, and social login"},
  {"key": "compositions.error-page", "name": "Error Page", "description": "Full-page error display (404, 500) with illustration and recovery"}
]
'''

[[instance.actions]]
name = "Activate"
