[[instance]]
type = "Taxonomy"
id = "taxonomy-japanese"

[[instance.actions]]
name = "Define"
[instance.actions.params]
name = "Japanese / Wabi-Sabi Digital"
parent_id = ""
description = "Imperfection, impermanence, incompleteness. Asymmetry, muted tones, natural materials, generous negative space. Quiet beauty."
characteristics = '{"key_traits": ["asymmetric", "muted-tones", "negative-space", "imperfection", "restrained"], "era": "traditional-present"}'
historical_context = "Rooted in wabi-sabi aesthetics, ikebana composition, karesansui gardens. Muji, Uniqlo, MUJI passport app."
related_taxonomy_ids = '["taxonomy-minimalism", "taxonomy-organic"]'

[[instance.actions]]
name = "Publish"
