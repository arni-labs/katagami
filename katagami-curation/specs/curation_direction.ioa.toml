# CurationDirection - I/O Automaton Specification
#
# One research-discovered direction that should become one synthesize job.
# This models source-search fan-out as Temper entities instead of a Rust loop.

[automaton]
name = "CurationDirection"
states = ["Discovered", "Synthesizing", "Completed", "Failed"]
initial = "Discovered"
allow_indefinite_states = ["Discovered", "Completed", "Failed"]

[[state]]
name = "query_id"
type = "string"
initial = ""

[[state]]
name = "source_search_job_id"
type = "string"
initial = ""

[[state]]
name = "workspace_id"
type = "string"
initial = ""

[[state]]
name = "task"
type = "string"
initial = ""

[[state]]
name = "scope"
type = "string"
initial = ""

[[state]]
name = "target_direction"
type = "string"
initial = ""

[[state]]
name = "palette_direction"
type = "string"
initial = ""

[[state]]
name = "output_type"
type = "string"
initial = "design_language"

[[state]]
name = "synthesis_job_type"
type = "string"
initial = "synthesize"

[[state]]
name = "source_ids"
type = "string"
initial = "[]"

[[state]]
name = "topic_allowlist"
type = "string"
initial = "[]"

[[state]]
name = "synth_input"
type = "string"
initial = "{}"

[[state]]
name = "design_language_ids"
type = "string"
initial = "[]"

[[state]]
name = "palette_system_ids"
type = "string"
initial = "[]"

[[state]]
name = "art_style_ids"
type = "string"
initial = "[]"

[[state]]
name = "error_message"
type = "string"
initial = ""

[[action]]
name = "Configure"
kind = "input"
from = ["Discovered"]
params = ["query_id", "source_search_job_id", "workspace_id", "task", "scope", "target_direction", "palette_direction", "output_type", "synthesis_job_type", "source_ids", "topic_allowlist", "synth_input"]
hint = "Record the researched direction, explicit output lane, routed job type, and exact synthesize input payload."

[[action]]
name = "QueueSynthesis"
kind = "input"
from = ["Discovered"]
to = "Synthesizing"
params = []
hint = "Create and start the synthesize CurationJob for this direction."

[[action.triggers]]
name = "direction_queue_synthesis_creates_job"
kind = "entity"
principal = "curation-service"
target_entity = "CurationJob"
target_action = "ConfigureAndSubmit"

[action.triggers.params]
completion_contract = "typed-v1"

[action.triggers.params_from]
job_type = "synthesis_job_type"
direction_id = "Id"
workspace_id = "workspace_id"
query_id = "query_id"
input = "synth_input"

[action.triggers.resolve_target]
type = "create"

[[action]]
name = "Complete"
kind = "input"
from = ["Synthesizing"]
to = "Completed"
params = ["design_language_ids"]
hint = "The design-language synthesize job for this direction completed."

[[action]]
name = "CompletePalette"
kind = "input"
from = ["Synthesizing"]
to = "Completed"
params = ["palette_system_ids"]
hint = "The palette synthesize job for this direction completed."

[[action]]
name = "CompleteArtStyle"
kind = "input"
from = ["Synthesizing"]
to = "Completed"
params = ["art_style_ids"]
hint = "The art-style synthesize job for this direction completed."

[[action]]
name = "Fail"
kind = "input"
from = ["Discovered", "Synthesizing"]
to = "Failed"
params = ["error_message"]
hint = "The direction could not be synthesized."

[[state_timeout]]
state = "Synthesizing"
after_seconds = 7200
on_timeout = "Fail"
params = { error_message = "CurationDirection remained Synthesizing for 2h without synthesis completion." }

[[invariant]]
name = "CompletedIsFinal"
when = ["Completed"]
assert = "no_further_transitions"

[[invariant]]
name = "FailedIsFinal"
when = ["Failed"]
assert = "no_further_transitions"
