temper_api_url = "{secret:temper_api_url}"
katagami_embed_url = "{secret:katagami_embed_url}"
katagami_embed_key = "{secret:katagami_embed_key}"

[[action]]
name = "CompleteWritingStyleSynthesis"
kind = "input"
from = ["Running"]
to = "Finalizing"
params = ["writing_style_ids", "output"]
hint = "Writing-style synthesis completed. Finalizer attests consent, proves bands self-consistency against the corpus and exemplars, verifies VOICE.md, publishes public assets, and walks each WritingStyle to Published. Terminal lane (no quality_review/organize cascade)."
effect = [{ type = "trigger", name = "finalize_spawned_session" }]

[[action.triggers]]
name = "finalize_spawned_session"
kind = "wasm"
module = "finalize_spawned_session"
timeout_secs = "300"

[action.triggers.config]
temper_api_url = "{secret:temper_api_url}"
katagami_embed_url = "{secret:katagami_embed_url}"
katagami_embed_key = "{secret:katagami_embed_key}"

[[action.triggers]]
name = "writing_style_synthesis_completes_direction"
kind = "entity"
principal = "curation-service"
target_entity = "CurationDirection"
target_action = "CompleteWritingStyle"
# drop_ok: CompleteWritingStyle is from=[Synthesizing] on the direction. Same as the
# palette and art-style lanes — if the direction already terminated before this job
# committed, the complete harmlessly drops. Intentionally conditional.
drop_ok = true

[action.triggers.params_from]
writing_style_ids = "writing_style_ids"

[action.triggers.resolve_target]
type = "field"
field = "direction_id"

# --- Finalizing ---

[[action]]
name = "PublishResearchCompletion"
kind = "internal"
from = ["Finalizing"]
to = "Completed"
params = ["followup_job_id"]
hint = "Legacy compatibility: record first synthesize follow-up and advance parent query."

[[action.triggers]]
name = "legacy_research_completion_advances_query"
kind = "entity"
principal = "curation-service"
target_entity = "CurationQuery"
target_action = "ResearchComplete"
# drop_ok: legacy-format compatibility path (fires from the internal
# PublishResearchCompletion finalize action) duplicating research_completion_advances_query.
# ResearchComplete is from=[Researching]; in the common typed-v1 flow the query has
# already advanced past Researching by the time this legacy path runs, so it
# harmlessly drops. Intentionally conditional. (Test test_inline_query_advancement_triggers_exist
# pins this trigger to exist; it is compatibility, not dead code.)
drop_ok = true

# ARN-88: ResearchComplete no longer carries synthesize_job_id/synthesize_job_ids
# (the barrier counters, not an id list, gate synthesis), so this legacy
# compatibility trigger only forwards the params ResearchComplete still declares.
[action.triggers.params]
direction_ids = "[]"

[action.triggers.params_from]
source_search_job_id = "Id"

[action.triggers.resolve_target]
type = "field"
field = "query_id"

[[action]]
name = "PublishOrganizationCompletion"
kind = "internal"
from = ["Finalizing"]
to = "Completed"
params = []
hint = "Legacy compatibility: advance the parent query once organizing finishes."

[[action.triggers]]
name = "legacy_organization_completion_finishes_query"
kind = "entity"
principal = "curation-service"
target_entity = "CurationQuery"
target_action = "OrganizationComplete"
# drop_ok: legacy-format compatibility path (fires from the internal
# PublishOrganizationCompletion finalize action) duplicating
# organization_completion_finishes_query. OrganizationComplete is from=[Organizing];
# when the query has already finished the legacy path harmlessly drops. Intentionally
# conditional. (Test test_inline_query_advancement_triggers_exist pins this to exist.)
drop_ok = true

[action.triggers.resolve_target]
type = "field"
field = "query_id"

[[action]]
name = "FinalizeCompletion"
kind = "internal"
from = ["Finalizing"]
to = "Completed"
params = ["followup_job_id", "design_language_ids", "output"]
hint = "Finalize job completion after session recording and trigger-native follow-up dispatch. For check_conformance jobs, output carries the full conformance report JSON (the job's product)."

[[action]]
name = "Fail"
kind = "input"
from = ["Queued", "Ready", "Running", "Finalizing"]
to = "Failed"
params = ["error_message"]
hint = "Mark job as failed with error details."
effect = [{ type = "trigger", name = "finalize_spawned_session" }]

# ADR-0046: inline trigger — migrated from [[integration]] below.
# Post-parse expansion re-synthesizes the equivalent Integration so
# the existing WASM runtime handles execution unchanged.
[[action.triggers]]
name = "finalize_spawned_session"
kind = "wasm"
module = "finalize_spawned_session"
timeout_secs = "300"

[action.triggers.config]
temper_api_url = "{secret:temper_api_url}"
katagami_embed_url = "{secret:katagami_embed_url}"
katagami_embed_key = "{secret:katagami_embed_key}"

[[state_timeout]]
state = "Queued"
after_seconds = 900
on_timeout = "Fail"
params = { error_message = "CurationJob remained Queued for 15m without submission." }

[[state_timeout]]
state = "Ready"
after_seconds = 900
on_timeout = "Fail"
params = { error_message = "CurationJob remained Ready for 15m without a spawned Session." }

[[state_timeout]]
state = "Running"
after_seconds = 7200
on_timeout = "Fail"
params = { error_message = "CurationJob remained Running for 2h without self-reporting completion." }

[[state_timeout]]
state = "Finalizing"
after_seconds = 900
on_timeout = "Fail"
params = { error_message = "CurationJob remained Finalizing for 15m without completing finalization." }

[[action.triggers]]
name = "job_failure_fails_direction"
kind = "entity"
principal = "curation-service"
target_entity = "CurationDirection"
target_action = "Fail"
# drop_ok: CurationDirection.Fail is from=[Discovered, Synthesizing, Reviewing]. If
# the direction already reached a terminal state (Completed/Failed/Quarantined) — e.g.
# it was Quarantined by its own timeout — the job-failure propagation harmlessly drops
# instead of re-failing a terminal direction. Intentionally conditional.
drop_ok = true

[action.triggers.params_from]
error_message = "error_message"

[action.triggers.resolve_target]
type = "field"
field = "direction_id"

[[action.triggers]]
name = "job_failure_fails_query"
kind = "entity"
principal = "curation-service"
target_entity = "CurationQuery"
target_action = "Fail"
# drop_ok: CurationQuery.Fail is from=[Submitted, Researching, Synthesizing,
# Organizing]. If the query already reached Completed or Failed, propagating a
# non-direction job failure harmlessly drops — a terminal query must not be re-failed.
# Intentionally conditional, in addition to the direction_id == "" guard below.
drop_ok = true

# ARN-88: only non-direction jobs (source_search/quality_review/organize, which
# carry direction_id=="") fail the query directly. A per-direction synthesize
# job failure routes through job_failure_fails_direction -> CurationDirection.Fail
# -> DecrementDirectionsPending, draining the barrier instead of racing the query
# into Failed while sibling directions are still synthesizing.
[action.triggers.guard]
type = "field_equals"
field = "direction_id"
value = ""

[action.triggers.params_from]
error_message = "error_message"

[action.triggers.resolve_target]
type = "field"
field = "query_id"

# --- Retry ---

[[action]]
name = "Retry"
kind = "input"
from = ["Failed"]
to = "Queued"
params = ["error_message"]
hint = "Retry a failed job. Resets to Queued for re-submission."

# --- Invariants ---

[[invariant]]
name = "CompletedIsFinal"
when = ["Completed"]
assert = "no_further_transitions"
