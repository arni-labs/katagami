# CurationJob — I/O Automaton Specification
#
# Task queue entry for the curator agent. Structurally identical
# to koto-wiki's WikiJob — same states, same session-spawning fields, same
# WASM triggers. Will be refactored into shared core later.
#
# Lifecycle: Queued -> Ready -> Running -> Completed | Failed
#
# Submit triggers build_session_message WASM which constructs a
# domain-specific prompt and spawns an agent session.

[automaton]
name = "CurationJob"
states = ["Queued", "Ready", "Running", "Completed", "Failed"]
initial = "Queued"

# --- State Variables ---

# Job classification: source_search, synthesize, generate_embodiment, review, organize, evolve, remix
[[state]]
name = "job_type"
type = "string"
initial = ""

# Which design language this job operates on (empty for discovery jobs)
[[state]]
name = "design_language_id"
type = "string"
initial = ""

# Shared workspace root for this curation run
[[state]]
name = "workspace_id"
type = "string"
initial = ""

# JSON: what to do (search queries, source IDs, language IDs, scope, etc.)
[[state]]
name = "input"
type = "string"
initial = "{}"

# JSON: what happened (languages created, sources indexed, issues found, etc.)
[[state]]
name = "output"
type = "string"
initial = "{}"

# JSON array of incremental progress entries
[[state]]
name = "progress_log"
type = "string"
initial = "[]"

# Error details if job failed
[[state]]
name = "error_message"
type = "string"
initial = ""

# Link back to parent CurationQuery for automated pipeline tracking
[[state]]
name = "query_id"
type = "string"
initial = ""

# --- Session spawning fields ---

# Agent identity for the session
[[state]]
name = "soul_id"
type = "string"
initial = "curator"

# LLM model identifier
[[state]]
name = "model"
type = "string"
initial = "claude-sonnet-4-20250514"

# LLM provider
[[state]]
name = "provider"
type = "string"
initial = "anthropic"

# Comma-separated tool list for the session
[[state]]
name = "tools_enabled"
type = "string"
initial = "temper_get,temper_list,temper_create,temper_action,temper_write,temper_read,temper_web_search,temper_web_fetch"

# Maximum conversation turns
[[state]]
name = "max_turns"
type = "string"
initial = "250"

# Constructed prompt for the session (built by WASM)
[[state]]
name = "user_message"
type = "string"
initial = ""

# ID of the spawned agent session
[[state]]
name = "session_id"
type = "string"
initial = ""

# --- Queued ---

[[action]]
name = "Configure"
kind = "input"
from = ["Queued"]
params = ["job_type", "design_language_id", "workspace_id", "input", "model", "provider", "soul_id", "max_turns", "tools_enabled", "query_id"]
hint = "Set or update job parameters before execution."

[[action]]
name = "Submit"
kind = "input"
from = ["Queued"]
to = "Ready"
hint = "Validate and prepare job for execution. Triggers message builder WASM."
effect = [{ type = "trigger", name = "build_session_message" }]

[[action]]
name = "Start"
kind = "input"
from = ["Queued"]
to = "Running"
params = []
hint = "Begin executing this job (direct start without session spawning)."

# --- Ready (session spawned, waiting for confirmation) ---

[[action]]
name = "SessionSpawned"
kind = "input"
from = ["Ready"]
to = "Running"
params = ["session_id", "workspace_id"]
hint = "Session has been created, attached to the shared workspace, and is running."

# --- Running ---

[[action]]
name = "RecordProgress"
kind = "input"
from = ["Running"]
params = ["progress_log"]
hint = "Append incremental progress entries during execution."

[[action]]
name = "Complete"
kind = "input"
from = ["Running"]
to = "Completed"
params = ["output"]
hint = "Mark job as successfully completed with output summary."
effect = [{ type = "trigger", name = "finalize_spawned_session" }]

# ADR-0046 (nerdsane/temper feat/action-triggers-unified): inline the
# reactions from specs/reactions.toml. All three rules target
# CurationQuery via query_id — each corresponds to one stage of the
# curation pipeline (research → synthesis → organize). The target
# CurationQuery's own guards decide which of these three advances apply.
#
# Requires temper-server branch feat/action-triggers-unified to land
# before this file can be authoritative; until then the old
# reactions.toml stays on disk as dual-source.

[[action.triggers]]
name = "research_complete_advances_query"
kind = "entity"
principal = "curation-service"
target_entity = "CurationQuery"
target_action = "ResearchComplete"

[action.triggers.resolve_target]
type = "field"
field = "query_id"

[[action.triggers]]
name = "synthesis_complete_advances_query"
kind = "entity"
principal = "curation-service"
target_entity = "CurationQuery"
target_action = "SynthesisComplete"

[action.triggers.resolve_target]
type = "field"
field = "query_id"

[[action.triggers]]
name = "organize_complete_finishes_query"
kind = "entity"
principal = "curation-service"
target_entity = "CurationQuery"
target_action = "OrganizationComplete"

[action.triggers.resolve_target]
type = "field"
field = "query_id"

[[action]]
name = "Fail"
kind = "input"
from = ["Ready", "Running"]
to = "Failed"
params = ["error_message"]
hint = "Mark job as failed with error details."
effect = [{ type = "trigger", name = "finalize_spawned_session" }]

[[action.triggers]]
name = "job_failure_fails_query"
kind = "entity"
principal = "curation-service"
target_entity = "CurationQuery"
target_action = "Fail"

[action.triggers.resolve_target]
type = "field"
field = "query_id"

# --- Retry ---

[[action]]
name = "Retry"
kind = "input"
from = ["Failed"]
to = "Queued"
params = ["error_message"]
hint = "Retry a failed job. Resets to Queued for re-submission."

# --- Invariants ---

[[invariant]]
name = "CompletedIsFinal"
when = ["Completed"]
assert = "no_further_transitions"

# --- Integrations ---

[[integration]]
name = "build_session_message"
trigger = "build_session_message"
type = "wasm"
module = "build_session_message"
on_failure = "Fail"

[integration.config]
temper_api_url = "{secret:temper_api_url}"
sandbox_provider = "{secret:sandbox_provider}"

[[integration]]
name = "finalize_spawned_session"
trigger = "finalize_spawned_session"
type = "wasm"
module = "finalize_spawned_session"

[integration.config]
temper_api_url = "{secret:temper_api_url}"
