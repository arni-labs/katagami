[[action]]
name = "CompleteConformanceCheck"
kind = "input"
from = ["Running"]
to = "Finalizing"
params = ["writing_style_ids", "output"]
hint = "Conformance check: job_type check_conformance with input JSON {writing_style_id, text_file_id}. The finalizer runs the full adherence stack (bands + attribution + fingerprint + margins + verbatim-overlap) over the candidate text against the named voice and returns the report in success_result. Reads only — never mutates the WritingStyle. This is the consumer-facing 'check this draft against voice X' surface (RFC-0002 conformance endpoint)."
