# CurationJob - I/O Automaton Specification
#
# Agent task queue for Katagami curation. New jobs use typed completion
# actions and reactions for follow-up orchestration. The legacy
# Complete(output) action remains for one compatibility window so already
# running sessions can finish safely.

[automaton]
name = "CurationJob"
states = ["Queued", "Ready", "Running", "Finalizing", "Completed", "Failed"]
initial = "Queued"
allow_indefinite_states = ["Queued", "Ready", "Running", "Finalizing", "Failed"]

# --- State Variables ---

[[state]]
name = "job_type"
type = "string"
initial = ""

[[state]]
name = "design_language_id"
type = "string"
initial = ""

[[state]]
name = "direction_id"
type = "string"
initial = ""

[[state]]
name = "workspace_id"
type = "string"
initial = ""

[[state]]
name = "input"
type = "string"
initial = "{}"

[[state]]
name = "output"
type = "string"
initial = "{}"

[[state]]
name = "followup_job_id"
type = "string"
initial = ""

[[state]]
name = "direction_ids"
type = "string"
initial = "[]"

[[state]]
name = "design_language_ids"
type = "string"
initial = "[]"

[[state]]
name = "review_input"
type = "string"
initial = "{}"

[[state]]
name = "organize_input"
type = "string"
initial = "{}"

[[state]]
name = "progress_log"
type = "string"
initial = "[]"

[[state]]
name = "error_message"
type = "string"
initial = ""

[[state]]
name = "query_id"
type = "string"
initial = ""

[[state]]
name = "completion_contract"
type = "string"
initial = "legacy-json-v1"

# --- Session spawning fields ---

[[state]]
name = "soul_id"
type = "string"
initial = "curator"

[[state]]
name = "model"
type = "string"
initial = ""

[[state]]
name = "provider"
type = "string"
initial = ""

[[state]]
name = "tools_enabled"
type = "string"
initial = "temper_get,temper_list,temper_create,temper_action,temper_write,temper_read,temper_web_search,temper_web_fetch"

[[state]]
name = "max_turns"
type = "string"
initial = "250"

[[state]]
name = "user_message"
type = "string"
initial = ""

[[state]]
name = "session_id"
type = "string"
initial = ""

# --- Queued ---

[[action]]
name = "Configure"
kind = "input"
from = ["Queued"]
params = ["job_type", "design_language_id", "direction_id", "workspace_id", "input", "model", "provider", "soul_id", "max_turns", "tools_enabled", "query_id", "completion_contract"]
hint = "Set or update job parameters before execution."

[[action]]
name = "ConfigureAndSubmit"
kind = "internal"
from = ["Queued"]
to = "Ready"
params = ["job_type", "design_language_id", "direction_id", "workspace_id", "input", "model", "provider", "soul_id", "max_turns", "tools_enabled", "query_id", "completion_contract"]
hint = "Configure a trigger-created job and start session spawning in one transition."
effect = [{ type = "trigger", name = "build_session_message" }]

[[action]]
name = "Submit"
kind = "input"
from = ["Queued"]
to = "Ready"
hint = "Legacy/manual start path. Triggers message builder WASM."
effect = [{ type = "trigger", name = "build_session_message" }]

[[action]]
name = "Start"
kind = "input"
from = ["Queued"]
to = "Running"
params = []
hint = "Begin executing this job directly without session spawning."

# --- Ready ---

[[action]]
name = "SessionSpawned"
kind = "input"
from = ["Ready"]
to = "Running"
params = ["session_id", "workspace_id"]
hint = "Session has been created, attached to the shared workspace, and is running."

# --- Running ---

[[action]]
name = "RecordProgress"
kind = "input"
from = ["Running"]
params = ["progress_log"]
hint = "Append incremental progress entries during execution."

[[action]]
name = "Complete"
kind = "input"
from = ["Running"]
to = "Finalizing"
params = ["output"]
hint = "Legacy compatibility completion. New jobs should use typed completion actions."
effect = [{ type = "trigger", name = "finalize_spawned_session" }]

[[action]]
name = "CompleteResearch"
kind = "input"
from = ["Running"]
to = "Finalizing"
params = ["direction_ids"]
hint = "Research completed after creating and queueing CurationDirection records."
effect = [{ type = "trigger", name = "finalize_spawned_session" }]

[[action]]
name = "CompleteSynthesis"
kind = "input"
from = ["Running"]
to = "Finalizing"
params = ["design_language_ids", "review_input"]
hint = "Synthesis completed and a quality review job should be created by trigger."
effect = [{ type = "trigger", name = "finalize_spawned_session" }]

[[action]]
name = "CompleteQualityReview"
kind = "input"
from = ["Running"]
to = "Finalizing"
params = ["design_language_ids", "organize_input"]
hint = "Quality review completed and taxonomy organization should be created by trigger."
effect = [{ type = "trigger", name = "finalize_spawned_session" }]

[[action]]
name = "CompleteOrganization"
kind = "input"
from = ["Running"]
to = "Finalizing"
params = ["output"]
hint = "Taxonomy organization completed."
effect = [{ type = "trigger", name = "finalize_spawned_session" }]

[[action]]
name = "CompleteRegeneration"
kind = "input"
from = ["Running"]
to = "Finalizing"
params = ["design_language_ids", "output"]
hint = "Embodiment regeneration completed."
effect = [{ type = "trigger", name = "finalize_spawned_session" }]

[[action]]
name = "CompleteEvolution"
kind = "input"
from = ["Running"]
to = "Finalizing"
params = ["design_language_ids", "output"]
hint = "Language evolution completed."
effect = [{ type = "trigger", name = "finalize_spawned_session" }]

# --- Finalizing ---

[[action]]
name = "PublishResearchCompletion"
kind = "internal"
from = ["Finalizing"]
to = "Completed"
params = ["followup_job_id"]
hint = "Legacy compatibility: record first synthesize follow-up and advance parent query."

[[action]]
name = "PublishSynthesisCompletion"
kind = "internal"
from = ["Finalizing"]
to = "Completed"
params = ["design_language_ids", "followup_job_id"]
hint = "Legacy compatibility: record review/organize follow-up and advance parent query."

[[action]]
name = "PublishOrganizationCompletion"
kind = "internal"
from = ["Finalizing"]
to = "Completed"
params = []
hint = "Legacy compatibility: advance the parent query once organizing finishes."

[[action]]
name = "FinalizeCompletion"
kind = "internal"
from = ["Finalizing"]
to = "Completed"
params = ["followup_job_id", "design_language_ids"]
hint = "Finalize job completion after session recording and trigger-native follow-up dispatch."

[[action]]
name = "Fail"
kind = "input"
from = ["Ready", "Running", "Finalizing"]
to = "Failed"
params = ["error_message"]
hint = "Mark job as failed with error details."
effect = [{ type = "trigger", name = "finalize_spawned_session" }]

# --- Retry ---

[[action]]
name = "Retry"
kind = "input"
from = ["Failed"]
to = "Queued"
params = ["error_message"]
hint = "Retry a failed job. Resets to Queued for re-submission."

# --- Invariants ---

[[invariant]]
name = "CompletedIsFinal"
when = ["Completed"]
assert = "no_further_transitions"

# --- Integrations ---

[[integration]]
name = "build_session_message"
trigger = "build_session_message"
type = "wasm"
module = "build_session_message"
on_failure = "Fail"

[integration.config]
temper_api_url = "{secret:temper_api_url}"
sandbox_provider = "{secret:sandbox_provider}"
llm_model = "{secret:llm_model}"
llm_provider = "{secret:llm_provider}"

[[integration]]
name = "finalize_spawned_session"
trigger = "finalize_spawned_session"
type = "wasm"
module = "finalize_spawned_session"

[integration.config]
temper_api_url = "{secret:temper_api_url}"
