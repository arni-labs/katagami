# CurationQuery — I/O Automaton Specification
#
# End-to-end pipeline tracker for automated curation output creation.
# A user submits a text query, and the system automatically runs the matching
# lane:
# design_language → research → synthesize (with embodiment) → taxonomy → publish
# palette/art_style → research → lane synthesis → publish
#
# Lifecycle: Submitted -> Researching -> Synthesizing -> Organizing -> Completed | Failed
#
# Submit fires an inline entity trigger that creates+submits the first
# (source_search) CurationJob. Subsequent state transitions are driven by reactions
# on typed CurationJob completion actions. Lane inference lives in the source_search
# agent skill, which records the concrete output_type on the query at ResearchComplete.

[automaton]
name = "CurationQuery"
states = ["Submitted", "Researching", "Synthesizing", "Organizing", "Completed", "Failed"]
initial = "Submitted"
allow_indefinite_states = ["Submitted", "Completed", "Failed"]

# --- State Variables ---

# The user's free-text design query (e.g., "Japanese woodblock prints meets brutalism")
[[state]]
name = "query_text"
type = "string"
initial = ""

# Explicit output lane. "auto" means the source_search agent infers the lane from
# query_text and records the normalized concrete value at ResearchComplete (before
# any direction reaches the barrier-scope guard).
[[state]]
name = "output_type"
type = "string"
initial = "auto"

# CurationJob IDs for each pipeline stage
[[state]]
name = "source_search_job_id"
type = "string"
initial = ""

[[state]]
name = "synthesize_job_id"
type = "string"
initial = ""

[[state]]
name = "direction_ids"
type = "string"
initial = "[]"

[[state]]
name = "synthesize_job_ids"
type = "string"
initial = "[]"

# Fan-out barrier counters (ARN-88). directions_pending is the live count of
# CurationDirections that have queued a synthesize job but not yet reached a
# terminal outcome; it is widened (+1) at QueueSynthesis and narrowed (-1) on
# every terminal direction edge (Complete* or Fail). directions_total is a
# monotonic floor (only ever incremented) recording that at least one direction
# existed, so a 0-direction query cannot satisfy the barrier. The barrier opens
# exactly when directions_pending == 0 AND directions_total >= 1.
[[state]]
name = "directions_pending"
type = "counter"
initial = "0"

[[state]]
name = "directions_total"
type = "counter"
initial = "0"

# Survivor counter (correction #2 sibling). Incremented only when a direction
# actually produced a design language (on RecordSynthesizeJob, which fires from the
# per-direction CompleteSynthesis, never on Fail/Quarantine). Lets the query tell a
# fully-quarantined/failed fan-out (directions_completed == 0) apart from a real one,
# so the all-quarantined case fast-fails instead of opening the barrier into an empty
# quality-review/organize stage.
[[state]]
name = "directions_completed"
type = "counter"
initial = "0"

[[state]]
name = "quality_review_job_ids"
type = "string"
initial = "[]"

[[state]]
name = "organize_job_ids"
type = "string"
initial = "[]"

# Tracks the job currently driving the organizing stage, which may start
# with a quality review job before taxonomy organization completes.
[[state]]
name = "organize_job_id"
type = "string"
initial = ""

# JSON array of DesignLanguage entity IDs created by this query
[[state]]
name = "design_language_ids"
type = "string"
initial = "[]"

# JSON arrays of terminal non-language lane entities created by this query
[[state]]
name = "palette_system_ids"
type = "string"
initial = "[]"

[[state]]
name = "art_style_ids"
type = "string"
initial = "[]"

[[state]]
name = "writing_style_ids"
type = "string"
initial = "[]"

# Error details if pipeline failed
[[state]]
name = "error_message"
type = "string"
initial = ""

# Shared workspace for all jobs in this query
[[state]]
name = "workspace_id"
type = "string"
initial = ""

# --- Actions ---

[[action]]
name = "Configure"
kind = "input"
from = ["Submitted"]
params = ["query_text", "output_type"]
hint = "Set the query text and optionally force output_type: auto, design_language, palette, or art_style."

[[action]]
name = "SetOutputType"
kind = "input"
from = ["Submitted"]
params = ["output_type"]
hint = "Optionally force the query output lane before submission."

[[action]]
name = "Submit"
kind = "input"
from = ["Submitted"]
to = "Researching"
hint = "Launch the automated pipeline. An inline entity trigger creates+submits the source_search CurationJob (mirrors direction_queue_synthesis_creates_job). Lane inference now lives in the source_search agent skill, not WASM: the research-direction skill infers the concrete output_type from query_text and records it on the query at CompleteResearch (ResearchComplete carries output_type). The shared katagami-library workspace is ensured by build_session_message when the source_search job spawns."

# C5: replaces the launch_research WASM. Create and submit the source_search job
# in one inline trigger. workspace_id is intentionally NOT set here —
# build_session_message ensures the shared katagami-library workspace when the job
# spawns, and the agent propagates that workspace id to the CurationDirections it
# creates (same pattern as every other job).
[[action.triggers]]
name = "submit_creates_source_search_job"
kind = "entity"
principal = "curation-service"
target_entity = "CurationJob"
target_action = "ConfigureAndSubmit"

[action.triggers.params]
job_type = "source_search"
completion_contract = "typed-v1"

[action.triggers.params_from]
query_id = "Id"
input = "query_text"

[action.triggers.resolve_target]
type = "create"

[[action]]
name = "ResearchComplete"
kind = "input"
from = ["Researching"]
to = "Synthesizing"
params = ["source_search_job_id", "direction_ids", "output_type"]
hint = "Research phase completed. CurationDirection records have queued synthesis jobs. Records the concrete output_type the source_search agent inferred (auto -> design_language/palette/art_style), so the barrier-open scoping guard (output_type == 'design_language') resolves correctly. This replaces the launch_research WASM's query-level output_type normalization (C5)."

[[action]]
name = "IncrementDirectionsPending"
kind = "input"
from = ["Researching", "Synthesizing"]
params = ["direction_id"]
hint = "One CurationDirection queued its synthesize job; widen the fan-out barrier by one. direction_id is carried only to scope the source-side exactly-once key; it is not stored."
effect = [{ type = "increment", var = "directions_pending" }, { type = "increment", var = "directions_total" }]

[[action]]
name = "DecrementDirectionsPending"
kind = "input"
from = ["Synthesizing"]
params = ["direction_id"]
hint = "One CurationDirection reached a barrier-draining outcome (ReviewPassed/FailReview after per-direction review, CompletePalette/CompleteArtStyle for the terminal lanes, or Fail/Quarantine); narrow the barrier by one. Re-evaluates the barrier-open advance via a same-id self reaction, and fast-fails the query if every direction drained without producing a language."
effect = [{ type = "decrement", var = "directions_pending" }]

[[action.triggers]]
name = "decrement_reevaluates_barrier_open"
kind = "entity"
principal = "curation-service"
target_entity = "CurationQuery"
target_action = "SynthesisComplete"
# drop_ok: the canonical barrier-open self-reaction. It fires on EVERY decrement but
# SynthesisComplete's guard (directions_pending==0 AND directions_total>=1 AND
# directions_completed>=1) only holds on the LAST decrement of a producing design-lane
# fan-out. On every earlier decrement, on the all-quarantined case (completed==0), and
# on the palette/art_style lanes, the advance is correctly not enabled and drops. This
# is the textbook intentionally-conditional barrier reaction.
drop_ok = true

# Scope the barrier-open advance to the design_language lane only. The
# palette/art_style lanes share the CurationDirection fan-out (so they widen
# and drain the same counters), but they are terminal lanes that must NOT
# advance to Organizing nor spawn a quality_review job. This guard keeps
# ARN-88's fix precise to the design-language fan-out it targets and leaves the
# other lanes' query-side behavior unchanged.
[action.triggers.guard]
type = "field_equals"
field = "output_type"
value = "design_language"

[action.triggers.resolve_target]
type = "same_id"

# All-quarantined fast-fail (correction #2 sibling): the barrier fully drained
# (directions_pending==0) but no direction produced a language
# (directions_completed==0) — every direction was Quarantined or Failed. There is
# nothing to review or organize; SynthesisComplete is blocked by its
# min_count(directions_completed>=1) floor, so without this the query would hang
# until the Synthesizing timeout. Fail it now instead, via the FailEmptyFanout
# action. The AND-conditions are split across the two places guards are allowed: the
# two COUNT conditions (directions_pending==0, directions_completed==0) live as an
# ACTION-level guard array on FailEmptyFanout (a TRIGGER guard is a single
# TriggerGuard, never an array, so a count conjunction cannot live on the trigger),
# while the design_language-lane scoping stays a SINGLE trigger guard below (string
# equality is a trigger-guard primitive, not an action guard). Mirrors
# empty_fanout_fails_query on CurationJob. drop_ok: this reaction fires on EVERY
# decrement but is a no-op unless the barrier drained empty in the design_language
# lane; on the common path (a direction produced a language, or a terminal
# palette/art_style lane, or directions still pending) FailEmptyFanout is not enabled
# and the reaction harmlessly drops — that is its intended design.
[[action.triggers]]
name = "all_directions_drained_empty_fails_query"
kind = "entity"
principal = "curation-service"
target_entity = "CurationQuery"
target_action = "FailEmptyFanout"
drop_ok = true

# Single trigger guard (NOT an array): scope the empty-fan-out fast-fail to the
# design_language lane. Lane scoping needs string equality, a trigger-guard
# primitive; the two count conditions ride the FailEmptyFanout action guard.
[action.triggers.guard]
type = "field_equals"
field = "output_type"
value = "design_language"

[action.triggers.params]
error_message = "Every curation direction was quarantined or failed; no design language was produced to review."

[action.triggers.resolve_target]
type = "same_id"

[[action]]
name = "RecordSynthesizeJob"
kind = "input"
from = ["Researching", "Synthesizing"]
params = ["synthesize_job_ids", "design_language_ids"]
hint = "Record a completed per-direction synthesize job id and its created design-language ids on the parent query, so the Organizing stage's organize_taxonomy job has the full language set the fan-out produced. Per-direction quality_review is now scoped from each CurationDirection's own design_language_ids (not this accumulation). Fires only when a direction actually produced a language, so it also increments directions_completed (the survivor counter). Does not gate the barrier; the counters do. Each list param is named after the list var it appends so kernel ListAppend (which reads params.get(var)) writes it."
effect = [
  { type = "list_append", var = "synthesize_job_ids" },
  { type = "list_append", var = "design_language_ids" },
  { type = "increment", var = "directions_completed" }
]

[[action]]
name = "SynthesisComplete"
kind = "input"
from = ["Synthesizing"]
to = "Organizing"
params = []
guard = [
  { type = "max_count", var = "directions_pending", max = 1 },
  { type = "min_count", var = "directions_total", min = 1 },
  { type = "min_count", var = "directions_completed", min = 1 }
]
hint = "Barrier open: every queued direction reached a terminal outcome (directions_pending==0), at least one direction ever existed (directions_total>=1), and at least one direction actually produced a reviewed language (directions_completed>=1). Per-direction quality_review is created and completed before this edge fires (each direction passes through Synthesizing->Reviewing->Completed). This advance creates the SINGLE organize_taxonomy job scoped to the full accumulated design_language_ids, then enters Organizing. Fired parameterless by the decrement self-reaction, so accumulated query state is preserved."

# Create the single organize_taxonomy job once, at barrier-open, scoped to the full
# set of languages the fan-out produced (accumulated on the query by
# RecordSynthesizeJob). Replaces the old per-query barrier review job and the
# per-CompleteQualityReview organize creation; with per-direction review, N reviews
# must not create N organize jobs. The organize skill re-lists all DesignLanguages
# itself, so `input` is informational scope.
[[action.triggers]]
name = "barrier_open_creates_organize_job"
kind = "entity"
principal = "curation-service"
target_entity = "CurationJob"
target_action = "ConfigureAndSubmit"

[action.triggers.params]
job_type = "organize_taxonomy"
completion_contract = "typed-v1"

[action.triggers.params_from]
workspace_id = "workspace_id"
query_id = "Id"
input = "design_language_ids"

[action.triggers.resolve_target]
type = "create"

[[action]]
name = "PaletteSynthesisComplete"
kind = "input"
from = ["Synthesizing"]
to = "Completed"
params = ["palette_system_ids"]
hint = "Palette lane synthesis completed. PaletteSystem records have been verified and published."

[[action]]
name = "ArtStyleSynthesisComplete"
kind = "input"
from = ["Synthesizing"]
to = "Completed"
params = ["art_style_ids"]
hint = "Art-style lane synthesis completed. ArtStyle records have been verified and published."


[[action]]
name = "WritingStyleSynthesisComplete"
kind = "input"
from = ["Synthesizing"]
to = "Completed"
params = ["writing_style_ids"]
hint = "Writing-style lane synthesis completed. WritingStyle records have been verified and published."

[[action]]
name = "OrganizationComplete"
kind = "input"
from = ["Organizing"]
to = "Completed"
hint = "Taxonomy organization finished. Pipeline complete."

[[action]]
name = "Fail"
kind = "input"
from = ["Submitted", "Researching", "Synthesizing", "Organizing"]
to = "Failed"
params = ["error_message"]
hint = "Pipeline failed at any stage."

# All-quarantined fast-fail target (ARN-88, correction #2 sibling). Fired by the
# DecrementDirectionsPending self-reaction (all_directions_drained_empty_fails_query)
# on every barrier-narrowing decrement. The two count conditions a TRIGGER guard
# cannot express as an array live here as an ACTION-level guard array: the fan-out
# has fully drained (directions_pending == 0) and produced zero languages
# (directions_completed == 0). When both hold the barrier opened into nothing —
# every direction was Quarantined or Failed — so fail the query rather than hang
# until the Synthesizing timeout. The design_language-lane scoping stays a SINGLE
# trigger guard (field_equals output_type) on the firing reaction, because lane
# scoping needs string equality, which is a trigger-guard primitive, not an action
# guard. From Synthesizing only, so once the query has advanced (palette/art_style
# Completed, or design-lane Organizing) the reaction is from-state-rejected — a
# harmless drop, declared drop_ok on the trigger.
[[action]]
name = "FailEmptyFanout"
kind = "input"
from = ["Synthesizing"]
to = "Failed"
params = ["error_message"]
# max_count is strict (val < max), so max=1 encodes "counter == 0" — matching
# SynthesisComplete's directions_pending<1 barrier-open guard above.
guard = [
  { type = "max_count", var = "directions_pending", max = 1 },
  { type = "max_count", var = "directions_completed", max = 1 },
]
hint = "Barrier drained empty (directions_pending==0, directions_completed==0): every direction was quarantined or failed and no language was produced to review or organize. Fails the query now rather than waiting for the Synthesizing timeout. Fired by the DecrementDirectionsPending self-reaction, which supplies error_message; the empty-fan-out counts are the action guard and the design_language-lane scoping is the firing reaction's single trigger guard."

[[state_timeout]]
state = "Researching"
after_seconds = 7200
on_timeout = "Fail"
params = { error_message = "CurationQuery remained Researching for 2h without source-search completion." }

[[state_timeout]]
state = "Synthesizing"
after_seconds = 14400
on_timeout = "Fail"
params = { error_message = "CurationQuery remained Synthesizing for 4h without synthesis completion." }

[[state_timeout]]
state = "Organizing"
after_seconds = 14400
on_timeout = "Fail"
params = { error_message = "CurationQuery remained Organizing for 4h without organization completion." }

# --- Invariants ---

[[invariant]]
name = "CompletedIsFinal"
when = ["Completed"]
assert = "no_further_transitions"

[[invariant]]
name = "FailedIsFinal"
when = ["Failed"]
assert = "no_further_transitions"
