# CurationQuery — I/O Automaton Specification
#
# End-to-end pipeline tracker for automated curation output creation.
# A user submits a text query, and the system automatically runs the matching
# lane:
# design_language → research → synthesize (with embodiment) → taxonomy → publish
# palette/art_style → research → lane synthesis → publish
#
# Lifecycle: Submitted -> Researching -> Synthesizing -> Organizing -> Completed | Failed
#
# Submit triggers launch_research WASM which creates the first CurationJob.
# Subsequent state transitions are driven by reactions on typed CurationJob
# completion actions.

[automaton]
name = "CurationQuery"
states = ["Submitted", "Researching", "Synthesizing", "Organizing", "Completed", "Failed"]
initial = "Submitted"
allow_indefinite_states = ["Submitted", "Completed", "Failed"]

# --- State Variables ---

# The user's free-text design query (e.g., "Japanese woodblock prints meets brutalism")
[[state]]
name = "query_text"
type = "string"
initial = ""

# Explicit output lane. "auto" means launch_research infers the lane from
# query_text and records the normalized value before source_search starts.
[[state]]
name = "output_type"
type = "string"
initial = "auto"

# CurationJob IDs for each pipeline stage
[[state]]
name = "source_search_job_id"
type = "string"
initial = ""

[[state]]
name = "synthesize_job_id"
type = "string"
initial = ""

[[state]]
name = "direction_ids"
type = "string"
initial = "[]"

[[state]]
name = "synthesize_job_ids"
type = "string"
initial = "[]"

# Fan-out barrier counters (ARN-88). directions_pending is the live count of
# CurationDirections that have queued a synthesize job but not yet reached a
# terminal outcome; it is widened (+1) at QueueSynthesis and narrowed (-1) on
# every terminal direction edge (Complete* or Fail). directions_total is a
# monotonic floor (only ever incremented) recording that at least one direction
# existed, so a 0-direction query cannot satisfy the barrier. The barrier opens
# exactly when directions_pending == 0 AND directions_total >= 1.
[[state]]
name = "directions_pending"
type = "counter"
initial = "0"

[[state]]
name = "directions_total"
type = "counter"
initial = "0"

[[state]]
name = "quality_review_job_ids"
type = "string"
initial = "[]"

[[state]]
name = "organize_job_ids"
type = "string"
initial = "[]"

# Tracks the job currently driving the organizing stage, which may start
# with a quality review job before taxonomy organization completes.
[[state]]
name = "organize_job_id"
type = "string"
initial = ""

# JSON array of DesignLanguage entity IDs created by this query
[[state]]
name = "design_language_ids"
type = "string"
initial = "[]"

# JSON arrays of terminal non-language lane entities created by this query
[[state]]
name = "palette_system_ids"
type = "string"
initial = "[]"

[[state]]
name = "art_style_ids"
type = "string"
initial = "[]"

# Error details if pipeline failed
[[state]]
name = "error_message"
type = "string"
initial = ""

# Shared workspace for all jobs in this query
[[state]]
name = "workspace_id"
type = "string"
initial = ""

# --- Actions ---

[[action]]
name = "Configure"
kind = "input"
from = ["Submitted"]
params = ["query_text", "output_type"]
hint = "Set the query text and optionally force output_type: auto, design_language, palette, or art_style."

[[action]]
name = "SetOutputType"
kind = "input"
from = ["Submitted"]
params = ["output_type"]
hint = "Optionally force the query output lane before submission."

[[action]]
name = "Submit"
kind = "input"
from = ["Submitted"]
to = "Researching"
hint = "Launch the automated pipeline. Triggers launch_research WASM."
effect = [{ type = "trigger", name = "launch_research" }]

# ADR-0046: inline trigger — migrated from [[integration]] below.
# Post-parse expansion re-synthesizes the equivalent Integration so
# the existing WASM runtime handles execution unchanged.
[[action.triggers]]
name = "launch_research"
kind = "wasm"
module = "launch_research"
on_failure = "Fail"

[action.triggers.config]
temper_api_url = "{secret:temper_api_url}"

[[action]]
name = "ResearchComplete"
kind = "input"
from = ["Researching"]
to = "Synthesizing"
params = ["source_search_job_id", "direction_ids"]
hint = "Research phase completed. CurationDirection records have queued synthesis jobs."

[[action]]
name = "IncrementDirectionsPending"
kind = "input"
from = ["Researching", "Synthesizing"]
params = ["direction_id"]
hint = "One CurationDirection queued its synthesize job; widen the fan-out barrier by one. direction_id is carried only to scope the source-side exactly-once key; it is not stored."
effect = [{ type = "increment", var = "directions_pending" }, { type = "increment", var = "directions_total" }]

[[action]]
name = "DecrementDirectionsPending"
kind = "input"
from = ["Synthesizing"]
params = ["direction_id"]
hint = "One CurationDirection reached a terminal outcome (Complete* or Fail); narrow the barrier by one. Re-evaluates the barrier-open advance via a same-id self reaction."
effect = [{ type = "decrement", var = "directions_pending" }]

[[action.triggers]]
name = "decrement_reevaluates_barrier_open"
kind = "entity"
principal = "curation-service"
target_entity = "CurationQuery"
target_action = "SynthesisComplete"

# Scope the barrier-open advance to the design_language lane only. The
# palette/art_style lanes share the CurationDirection fan-out (so they widen
# and drain the same counters), but they are terminal lanes that must NOT
# advance to Organizing nor spawn a quality_review job. This guard keeps
# ARN-88's fix precise to the design-language fan-out it targets and leaves the
# other lanes' query-side behavior unchanged.
[action.triggers.guard]
type = "field_equals"
field = "output_type"
value = "design_language"

[action.triggers.resolve_target]
type = "same_id"

[[action]]
name = "RecordSynthesizeJob"
kind = "input"
from = ["Researching", "Synthesizing"]
params = ["synthesize_job_ids", "design_language_ids"]
hint = "Record a completed per-direction synthesize job id and its created design-language ids on the parent query, so the barrier-open quality_review job can be scoped to every language the fan-out produced. Does not gate the barrier; the counter does. Each param is named after the list var it appends so kernel ListAppend (which reads params.get(var)) writes it."
effect = [
  { type = "list_append", var = "synthesize_job_ids" },
  { type = "list_append", var = "design_language_ids" }
]

[[action]]
name = "SynthesisComplete"
kind = "input"
from = ["Synthesizing"]
to = "Organizing"
params = []
guard = [
  { type = "max_count", var = "directions_pending", max = 1 },
  { type = "min_count", var = "directions_total", min = 1 }
]
hint = "Barrier open: every queued direction reached a terminal outcome (directions_pending==0) and at least one direction ever existed (directions_total>=1). Fired parameterless by the decrement self-reaction; reads accumulated design_language_ids/workspace_id from query state to create the single quality_review job. No params are supplied by the self-reaction, so accumulated state is preserved."

[[action.triggers]]
name = "barrier_open_creates_quality_review_job"
kind = "entity"
principal = "curation-service"
target_entity = "CurationJob"
target_action = "ConfigureAndSubmit"

[action.triggers.params]
job_type = "quality_review"
completion_contract = "typed-v1"

[action.triggers.params_from]
workspace_id = "workspace_id"
query_id = "Id"
# Scope the review to every language the fan-out produced (accumulated on the
# query by RecordSynthesizeJob). build_session_message embeds the job's `input`;
# the review-quality skill reviews these languages (or ALL for the query if the
# list is empty). `input` is a declared ConfigureAndSubmit param.
input = "design_language_ids"

[action.triggers.resolve_target]
type = "create"

[[action]]
name = "PaletteSynthesisComplete"
kind = "input"
from = ["Synthesizing"]
to = "Completed"
params = ["palette_system_ids"]
hint = "Palette lane synthesis completed. PaletteSystem records have been verified and published."

[[action]]
name = "ArtStyleSynthesisComplete"
kind = "input"
from = ["Synthesizing"]
to = "Completed"
params = ["art_style_ids"]
hint = "Art-style lane synthesis completed. ArtStyle records have been verified and published."

[[action]]
name = "OrganizationComplete"
kind = "input"
from = ["Organizing"]
to = "Completed"
hint = "Taxonomy organization finished. Pipeline complete."

[[action]]
name = "Fail"
kind = "input"
from = ["Submitted", "Researching", "Synthesizing", "Organizing"]
to = "Failed"
params = ["error_message"]
hint = "Pipeline failed at any stage."

[[state_timeout]]
state = "Researching"
after_seconds = 7200
on_timeout = "Fail"
params = { error_message = "CurationQuery remained Researching for 2h without source-search completion." }

[[state_timeout]]
state = "Synthesizing"
after_seconds = 14400
on_timeout = "Fail"
params = { error_message = "CurationQuery remained Synthesizing for 4h without synthesis completion." }

[[state_timeout]]
state = "Organizing"
after_seconds = 14400
on_timeout = "Fail"
params = { error_message = "CurationQuery remained Organizing for 4h without organization completion." }

# --- Invariants ---

[[invariant]]
name = "CompletedIsFinal"
when = ["Completed"]
assert = "no_further_transitions"

[[invariant]]
name = "FailedIsFinal"
when = ["Failed"]
assert = "no_further_transitions"
