name = "katagami-curation"
description = "Agent work layer for katagami — CurationJob queue, curator sessions, CurationDirection fan-out, and multi-lane language, palette, and art-style curation."
version = "0.1.0"
startup_install = "core"
dependencies = [
  "temperpaw/paw-fs@bff862b415505f5a563998265a2f6ac29472f899",
  "temperpaw/paw-agent@81d8beb78923dc22aeda850828f510f3c6eab510",
  "temperpaw/paw-research@910d01612b2632362fb5f537c4357a5fb6c7bcdd",
  "katagami/katagami-commons@81865eb4f22fcc18cea3751e9628eff1af9b8a4a",
]

# These declarations are REQUIRED — the installer only uploads WASM
# artifacts listed here. Without them, even if the compiled `.wasm`
# files are shipped in the image, `wasm_modules: []` comes back empty
# at tenant install and every WASM trigger (build_session_message,
# finalize_spawned_session) fails with
# "WASM module not found". Same trap that hit paw-research on
# 2026-04-18.
# (launch_research was deleted in C5 — CurationQuery.Submit now creates the
# source_search job via an inline entity trigger, not WASM.)

[[wasm_modules]]
name = "build_session_message"
criticality = "app-required"
startup_loading = "lazy"

[[wasm_modules]]
name = "finalize_spawned_session"
criticality = "app-required"
startup_loading = "lazy"
