# Katagami curation cross-entity reactions.
#
# Reactions are Temper-native, bounded cross-entity transitions. They replace
# the old Rust finalizer cascade for jobs that use completion_contract=typed-v1.

[[reaction]]
name = "direction_queue_synthesis_creates_job"

[reaction.when]
entity_type = "CurationDirection"
action = "QueueSynthesis"
to_state = "Synthesizing"

[reaction.then]
entity_type = "CurationJob"
action = "ConfigureAndSubmit"
params = { job_type = "synthesize", completion_contract = "typed-v1" }
params_from = { direction_id = "Id", workspace_id = "workspace_id", query_id = "query_id", input = "synth_input" }

[reaction.resolve_target]
type = "create"

[[reaction]]
name = "research_completion_advances_query"

[reaction.when]
entity_type = "CurationJob"
action = "CompleteResearch"
to_state = "Finalizing"

[reaction.when.guard]
type = "field_equals"
field = "job_type"
value = "source_search"

[reaction.then]
entity_type = "CurationQuery"
action = "ResearchComplete"
params = { synthesize_job_id = "", synthesize_job_ids = "[]" }
params_from = { source_search_job_id = "Id", direction_ids = "direction_ids" }

[reaction.resolve_target]
type = "field"
field = "query_id"

[[reaction]]
name = "synthesis_creates_quality_review_job"

[reaction.when]
entity_type = "CurationJob"
action = "CompleteSynthesis"
to_state = "Finalizing"

[reaction.when.guard]
type = "field_equals"
field = "job_type"
value = "synthesize"

[reaction.then]
entity_type = "CurationJob"
action = "ConfigureAndSubmit"
params = { job_type = "quality_review", completion_contract = "typed-v1" }
params_from = { workspace_id = "workspace_id", query_id = "query_id", input = "review_input" }

[reaction.resolve_target]
type = "create"

[[reaction]]
name = "synthesis_completes_direction"

[reaction.when]
entity_type = "CurationJob"
action = "CompleteSynthesis"
to_state = "Finalizing"

[reaction.when.guard]
type = "field_equals"
field = "job_type"
value = "synthesize"

[reaction.then]
entity_type = "CurationDirection"
action = "Complete"
params_from = { design_language_ids = "design_language_ids" }

[reaction.resolve_target]
type = "field"
field = "direction_id"

[[reaction]]
name = "synthesis_completion_advances_query"

[reaction.when]
entity_type = "CurationJob"
action = "CompleteSynthesis"
to_state = "Finalizing"

[reaction.when.guard]
type = "field_equals"
field = "job_type"
value = "synthesize"

[reaction.then]
entity_type = "CurationQuery"
action = "SynthesisComplete"
params = { organize_job_id = "", quality_review_job_ids = "[]" }
params_from = { design_language_ids = "design_language_ids" }

[reaction.resolve_target]
type = "field"
field = "query_id"

[[reaction]]
name = "review_creates_organization_job"

[reaction.when]
entity_type = "CurationJob"
action = "CompleteQualityReview"
to_state = "Finalizing"

[reaction.when.guard]
type = "field_equals"
field = "job_type"
value = "quality_review"

[reaction.then]
entity_type = "CurationJob"
action = "ConfigureAndSubmit"
params = { job_type = "organize_taxonomy", completion_contract = "typed-v1" }
params_from = { workspace_id = "workspace_id", query_id = "query_id", input = "organize_input" }

[reaction.resolve_target]
type = "create"

[[reaction]]
name = "organization_completion_finishes_query"

[reaction.when]
entity_type = "CurationJob"
action = "CompleteOrganization"
to_state = "Finalizing"

[reaction.when.guard]
type = "field_equals"
field = "job_type"
value = "organize_taxonomy"

[reaction.then]
entity_type = "CurationQuery"
action = "OrganizationComplete"

[reaction.resolve_target]
type = "field"
field = "query_id"

# Legacy compatibility: Complete(output) still finalizes through WASM and then
# publishes these explicit completion actions.

[[reaction]]
name = "legacy_research_completion_advances_query"

[reaction.when]
entity_type = "CurationJob"
action = "PublishResearchCompletion"
to_state = "Completed"

[reaction.then]
entity_type = "CurationQuery"
action = "ResearchComplete"
params = { direction_ids = "[]", synthesize_job_ids = "[]" }
params_from = { source_search_job_id = "Id", synthesize_job_id = "followup_job_id" }

[reaction.resolve_target]
type = "field"
field = "query_id"

[[reaction]]
name = "legacy_synthesis_completion_advances_query"

[reaction.when]
entity_type = "CurationJob"
action = "PublishSynthesisCompletion"
to_state = "Completed"

[reaction.then]
entity_type = "CurationQuery"
action = "SynthesisComplete"
params = { quality_review_job_ids = "[]" }
params_from = { design_language_ids = "design_language_ids", organize_job_id = "followup_job_id" }

[reaction.resolve_target]
type = "field"
field = "query_id"

[[reaction]]
name = "legacy_organization_completion_finishes_query"

[reaction.when]
entity_type = "CurationJob"
action = "PublishOrganizationCompletion"
to_state = "Completed"

[reaction.then]
entity_type = "CurationQuery"
action = "OrganizationComplete"

[reaction.resolve_target]
type = "field"
field = "query_id"

[[reaction]]
name = "job_failure_fails_direction"

[reaction.when]
entity_type = "CurationJob"
action = "Fail"
to_state = "Failed"

[reaction.then]
entity_type = "CurationDirection"
action = "Fail"
params_from = { error_message = "error_message" }

[reaction.resolve_target]
type = "field"
field = "direction_id"

[[reaction]]
name = "job_failure_fails_query"

[reaction.when]
entity_type = "CurationJob"
action = "Fail"
to_state = "Failed"

[reaction.then]
entity_type = "CurationQuery"
